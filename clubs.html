<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Планово — Демо: Клубы и мероприятия</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#10b981;--primary-light:#34d399;--secondary:#06b6d4;--secondary-light:#22d3ee;
  --accent:#14b8a6;--gradient-primary:linear-gradient(135deg,#10b981 0%,#06b6d4 100%);
  --dark:#0f172a;--gray-600:#4b5563;--gray-500:#6b7280;--gray-400:#9ca3af;
  --gray-300:#d1d5db;--gray-200:#e5e7eb;--gray-100:#f3f4f6;--gray-50:#f9fafb;
  --white:#ffffff;--success:#10b981;--warning:#f59e0b;--error:#ef4444;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);--shadow-md:0 4px 6px rgba(0,0,0,0.1);
  --shadow-lg:0 10px 15px rgba(0,0,0,0.1);--shadow-xl:0 20px 25px rgba(0,0,0,0.1);
  --transition:all 0.2s ease;
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--dark);background:var(--gray-50);line-height:1.5}
.container{max-width:1200px;margin:0 auto;padding:0 16px}
@media(min-width:640px){.container{padding:0 24px}}

.app-header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--gray-200)}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-icon{width:40px;height:40px;border-radius:12px;background:var(--gradient-primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;box-shadow:var(--shadow-md)}
.logo-text{font-weight:800;font-size:18px;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:10px;color:var(--gray-500);display:none}
@media(min-width:640px){.logo-sub{display:block}}
.role-tabs{display:flex;gap:8px}
.role-tab{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:1px solid var(--gray-200);background:#fff;font-size:13px;font-weight:600;color:var(--gray-600);cursor:pointer;transition:var(--transition);white-space:nowrap}
.role-tab:hover{border-color:var(--primary-light);color:var(--primary)}
.role-tab.active{background:var(--gradient-primary);color:#fff;border-color:transparent;box-shadow:var(--shadow-md)}
.role-tab i{font-size:14px}
.mobile-menu-btn{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border:none;background:none;color:var(--gray-600);font-size:20px;cursor:pointer;border-radius:8px}
.mobile-menu-btn:hover{background:var(--gray-100)}
@media(min-width:768px){.mobile-menu-btn{display:none}.role-tabs-desktop{display:flex}.role-tabs-mobile{display:none!important}}
@media(max-width:767px){.role-tabs-desktop{display:none}.role-tabs-mobile{display:flex;flex-direction:column;padding-bottom:16px;gap:8px}}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--gray-500);font-size:13px;font-weight:500;text-decoration:none;padding:8px 0;transition:var(--transition)}
.back-link:hover{color:var(--primary)}
.main-content{padding:24px 0 48px}
.card{background:#fff;border:1px solid var(--gray-200);border-radius:16px;overflow:hidden}
.card-body{padding:24px}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;border:1px solid var(--gray-200);background:#fff;font-size:13px;font-weight:600;font-family:inherit;color:var(--gray-600);cursor:pointer;transition:var(--transition)}
.btn:hover{border-color:var(--primary-light);color:var(--primary)}
.btn-primary{background:var(--gradient-primary);color:#fff;border-color:transparent;box-shadow:var(--shadow-md)}
.btn-primary:hover{box-shadow:var(--shadow-lg);opacity:0.95;color:#fff}
.btn-sm{padding:6px 14px;font-size:12px}

.tab-bar{display:flex;gap:4px;background:var(--gray-100);border-radius:12px;padding:4px;margin-bottom:16px}
.tab-btn{flex:1;padding:8px 16px;border:none;background:none;border-radius:10px;font-size:13px;font-weight:600;color:var(--gray-500);cursor:pointer;transition:var(--transition);font-family:inherit}
.tab-btn:hover{color:var(--gray-600)}
.tab-btn.active{background:#fff;color:var(--dark);box-shadow:var(--shadow-sm)}

.section-title{font-size:16px;font-weight:700;margin-bottom:12px}

/* Schedule grid */
.schedule-wrapper{overflow-x:auto}
.grid-header{display:grid;grid-template-columns:72px repeat(7,1fr);border-bottom:1px solid var(--gray-200)}
.grid-header-cell{padding:10px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--gray-500);border-right:1px solid var(--gray-200)}
.grid-header-cell:last-child{border-right:none}
.grid-header-cell.today{color:var(--primary);background:rgba(16,185,129,0.05)}
.grid-row{display:grid;grid-template-columns:72px repeat(7,1fr);border-bottom:1px solid var(--gray-200)}
.grid-row:last-child{border-bottom:none}
.time-cell{padding:8px 6px;border-right:1px solid var(--gray-200);display:flex;align-items:center;justify-content:center}
.time-cell .time{font-size:10px;color:var(--gray-400);font-weight:500}
.day-cell{padding:4px;border-right:1px solid var(--gray-200);min-height:48px;position:relative}
.day-cell:last-child{border-right:none}
.day-cell.today-col{background:rgba(16,185,129,0.02)}

/* Event card */
.event-card{padding:6px 8px;border-radius:8px;border-left:3px solid;font-size:10px;margin-bottom:3px;cursor:pointer;transition:var(--transition);background:#fff}
.event-card:hover{box-shadow:var(--shadow-sm)}
.event-card .ec-name{font-weight:700;font-size:11px;line-height:1.2}
.event-card .ec-room{color:var(--gray-500);font-size:9px;margin-top:1px}
.event-card .ec-rsvp{font-size:9px;font-weight:600;margin-top:2px}

/* Event full card */
.event-full{padding:16px;border-radius:16px;border:1px solid var(--gray-200);background:#fff;transition:var(--transition);margin-bottom:12px}
.event-full:hover{border-color:var(--primary-light);box-shadow:var(--shadow-sm)}
.event-full .ef-top{display:flex;align-items:flex-start;gap:12px}
.event-full .ef-color{width:4px;border-radius:2px;min-height:40px;flex-shrink:0}
.event-full .ef-name{font-weight:700;font-size:15px}
.event-full .ef-meta{font-size:12px;color:var(--gray-500);margin-top:4px;display:flex;flex-wrap:wrap;gap:8px}
.event-full .ef-meta span{display:inline-flex;align-items:center;gap:4px}

/* Club card */
.club-card{padding:20px;border-radius:16px;border:1px solid var(--gray-200);background:#fff;transition:var(--transition);cursor:pointer}
.club-card:hover{border-color:var(--primary-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.club-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;margin-bottom:12px}
.club-card h3{font-size:16px;font-weight:700;margin-bottom:4px}
.club-card p{font-size:13px;color:var(--gray-500);margin-bottom:12px}

/* RSVP badge */
.rsvp-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
.rsvp-going{background:#d1fae5;color:#059669}
.rsvp-maybe{background:#fef3c7;color:#92400e}
.rsvp-none{background:var(--gray-100);color:var(--gray-500)}

/* Member list */
.member-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-100)}
.member-row:last-child{border-bottom:none}
.member-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff}
.member-name{flex:1;font-size:13px;font-weight:500}
.member-rsvp{font-size:11px;font-weight:600}

/* Room badge */
.room-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;background:var(--gray-50);color:var(--gray-600);border:1px solid var(--gray-200)}

/* Stat card */
.stat-card{padding:20px;border-radius:16px;border:1px solid var(--gray-200);background:#fff}
.stat-card .stat-value{font-size:28px;font-weight:800;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card .stat-label{font-size:12px;color:var(--gray-500);margin-top:4px}

/* Create event form */
.create-form{display:flex;flex-direction:column;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:12px;font-weight:600;color:var(--gray-600)}
.form-input{padding:8px 12px;border-radius:10px;border:1px solid var(--gray-200);font-size:13px;font-family:inherit;color:var(--dark)}
.form-input:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(16,185,129,0.1)}
.form-select{padding:8px 12px;border-radius:10px;border:1px solid var(--gray-200);font-size:13px;font-family:inherit;color:var(--dark);background:#fff;cursor:pointer}

/* Recurring badge */
.recurring-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(16,185,129,0.1);color:var(--primary)}

/* Mobile */
.mobile-schedule{display:none}
@media(max-width:1023px){.desktop-schedule{display:none}.mobile-schedule{display:block}}
@media(min-width:1024px){.desktop-schedule{display:block}.mobile-schedule{display:none}}
.mobile-day-tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px}
.mobile-day-tab{padding:8px 16px;border-radius:10px;border:1px solid var(--gray-200);background:#fff;font-size:13px;font-weight:600;color:var(--gray-500);cursor:pointer;transition:var(--transition);white-space:nowrap}
.mobile-day-tab:hover{border-color:var(--primary-light)}
.mobile-day-tab.active{background:var(--gradient-primary);color:#fff;border-color:transparent}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#fff;border-radius:16px;padding:24px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto}

@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeInUp 0.3s ease-out}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-400)}

/* Notification toggle */
.toggle{width:44px;height:24px;border-radius:12px;background:var(--gray-200);position:relative;cursor:pointer;transition:var(--transition)}
.toggle.on{background:var(--primary)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);transition:var(--transition)}
.toggle.on::after{left:22px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect}=React;

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════

const MEMBERS=[

  {id:"m2",name:"Мария Сидорова",avatar:"#ec4899"},
  {id:"m3",name:"Дмитрий Козлов",avatar:"#f59e0b"},

  {id:"m5",name:"Иван Новиков",avatar:"#ef4444"},
  {id:"m6",name:"Ольга Лебедева",avatar:"#8b5cf6"},
  {id:"m7",name:"Сергей Морозов",avatar:"#06b6d4"},
  {id:"m8",name:"Наталья Карпова",avatar:"#f97316"},
  {id:"m9",name:"Павел Соколов",avatar:"#14b8a6"},
  {id:"m10",name:"Анна Зайцева",avatar:"#d946ef"},
  {id:"m11",name:"Виктор Буфеев",avatar:"#0ea5e9"},
  {id:"m12",name:"Кристина Павлова",avatar:"#84cc16"},
  {id:"m13",name:"Тимофей Орлов",avatar:"#eab308"},
  {id:"m14",name:"Вера Лисицына",avatar:"#a855f7"},
  {id:"m15",name:"Артём Громов",avatar:"#22d3ee"},
];

const EVENTS=[
  // Monday
  {id:"e1",clubId:"club3",name:"Утренняя йога",day:0,slot:0,room:"ra",type:"regular",recurring:"Каждый Пн 09:00",maxAttendees:25,attendees:["m1","m4","m6","m8","m10"],rsvp:{m1:"going",m4:"going",m6:"maybe",m8:"going",m10:"going"}},
  {id:"e2",clubId:"club2",name:"Открытый игровой вечер",day:0,slot:4,room:"rb",type:"regular",recurring:"Каждый Пн 17:00",maxAttendees:30,attendees:["m2","m3","m5","m7","m9","m11"],rsvp:{m2:"going",m3:"going",m5:"maybe",m7:"going",m9:"going",m11:"going"}},
  {id:"e3",clubId:"club1",name:"Обсуждение: «Мастер и Маргарита»",day:0,slot:5,room:"rc",type:"regular",recurring:"Каждый Пн 19:00",maxAttendees:12,attendees:["m1","m2","m6","m12"],rsvp:{m1:"going",m2:"going",m6:"going",m12:"maybe"}},

  // Tuesday
  {id:"e4",clubId:"club3",name:"Медитация для начинающих",day:1,slot:1,room:"rd",type:"workshop",recurring:null,maxAttendees:15,attendees:["m4","m8","m10"],rsvp:{m4:"going",m8:"going",m10:"maybe"}},
  {id:"e5",clubId:"club2",name:"Турнир по шахматам",day:1,slot:4,room:"rc",type:"one-time",recurring:null,maxAttendees:12,attendees:["m3","m5","m7","m9","m11","m13"],rsvp:{m3:"going",m5:"going",m7:"going",m9:"going",m11:"going",m13:"maybe"}},

  // Wednesday
  {id:"e6",clubId:"club3",name:"Виньяса-флоу",day:2,slot:0,room:"ra",type:"regular",recurring:"Каждая Ср 09:00",maxAttendees:25,attendees:["m1","m4","m6","m8","m10","m14"],rsvp:{m1:"going",m4:"going",m6:"going",m8:"maybe",m10:"going",m14:"going"}},
  {id:"e7",clubId:"club2",name:"Партия в Мачи Коро",day:2,slot:3,room:"rd",type:"regular",recurring:"Каждая Ср 15:00",maxAttendees:20,attendees:["m2","m3","m7"],rsvp:{m2:"going",m3:"maybe",m7:"going"}},
  {id:"e8",clubId:"club1",name:"Книжный марафон",day:2,slot:5,room:"rb",type:"workshop",recurring:null,maxAttendees:30,attendees:["m1","m2","m6","m12","m15"],rsvp:{m1:"going",m2:"going",m6:"going",m12:"going",m15:"maybe"}},

  {id:"e9",clubId:"club3",name:"Йога нидра",day:3,slot:5,room:"ra",type:"regular",recurring:"Каждый Чт 19:00",maxAttendees:25,attendees:["m4","m8","m10","m14"],rsvp:{m4:"going",m8:"going",m10:"maybe",m14:"going"}},

  {id:"e14",clubId:"club1",name:"Обсуждение: «1984»",day:4,slot:5,room:"rc",type:"regular",recurring:"Каждая Пт 19:00",maxAttendees:12,attendees:["m1","m2","m6","m12","m15"],rsvp:{m1:"going",m2:"going",m6:"maybe",m12:"going",m15:"going"}},

  // Saturday
  {id:"e15",clubId:"club3",name:"Йога на свежем воздухе",day:5,slot:0,room:"ra",type:"regular",recurring:"Каждая Сб 09:00",maxAttendees:30,attendees:["m1","m4","m6","m8","m10","m14"],rsvp:{m1:"going",m4:"going",m6:"going",m8:"going",m10:"going",m14:"maybe"}},
  {id:"e16",clubId:"club2",name:"Семейный игровой день",day:5,slot:2,room:"rb",type:"regular",recurring:"Каждая Сб 13:00",maxAttendees:50,attendees:["m2","m3","m5","m7","m9","m11","m13","m15"],rsvp:{m2:"going",m3:"going",m5:"going",m7:"maybe",m9:"going",m11:"going",m13:"going",m15:"going"}},
];

function getNowInfo(){
  const now=new Date();const dow=now.getDay();const dayMap=[6,0,1,2,3,4,5];
  return{currentDay:dayMap[dow],isWeekend:dow===0||dow===6};
}

// ═══════════════════════════════════════════
// ORGANIZER VIEW
// ═══════════════════════════════════════════
function OrganizerView(){
  const[activeTab,setActiveTab]=useState('calendar');
  const[showCreateModal,setShowCreateModal]=useState(false);
  const[showEventModal,setShowEventModal]=useState(null);
  const[selectedClub,setSelectedClub]=useState(null);
  const[checkIn,setCheckIn]=useState({});
  const[newEvent,setNewEvent]=useState({name:'',clubId:'club1',day:0,slot:0,room:'ra',type:'regular',recurring:'',maxAttendees:20});
  const nowInfo=getNowInfo();

  const handleCreateEvent=()=>{
    const ev={
      id:`e-${Date.now()}`,clubId:newEvent.clubId,name:newEvent.name,
      day:newEvent.day,slot:newEvent.slot,room:newEvent.room,type:newEvent.type,
      recurring:newEvent.recurring||null,maxAttendees:newEvent.maxAttendees,
      attendees:[],rsvp:{}
    };
    EVENTS.push(ev);
    setShowCreateModal(false);
    setNewEvent({name:'',clubId:'club1',day:0,slot:0,room:'ra',type:'regular',recurring:'',maxAttendees:20});
  };

  const filteredEvents=selectedClub?EVENTS.filter(e=>e.clubId===selectedClub):EVENTS;

  // Today's events
  const todayEvents=filteredEvents.filter(e=>e.day===nowInfo.currentDay).sort((a,b)=>a.slot-b.slot);

  // Upcoming events (next 3 days)
  const upcomingEvents=filteredEvents.filter(e=>e.day>nowInfo.currentDay).sort((a,b)=>a.day-b.day||a.slot-b.slot).slice(0,5);

  return(
    <div className="fade-in">
      {/* Club filter */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
        <button className={`role-tab ${!selectedClub?'active':''}`} onClick={()=>setSelectedClub(null)}>
          <i className="fas fa-layer-group"></i> Все
        </button>
        {CLUBS.map(c=>(
          <button key={c.id} className={`role-tab ${selectedClub===c.id?'active':''}`} onClick={()=>setSelectedClub(c.id)} style={selectedClub===c.id?{background:c.gradient}:{}}>
            <i className={`fas ${c.icon}`}></i> {c.name}
          </button>
        ))}
      </div>

      <div className="tab-bar">

        <button className={`tab-btn ${activeTab==='dashboard'?'active':''}`} onClick={()=>setActiveTab('dashboard')}>Дашборд</button>
        <button className={`tab-btn ${activeTab==='members'?'active':''}`} onClick={()=>setActiveTab('members')}>Участники</button>
        <button className={`tab-btn ${activeTab==='rooms'?'active':''}`} onClick={()=>setActiveTab('rooms')}>Помещения</button>

          <div style={{display:'flex',gap:8,marginBottom:16}}>

                    <div className="grid-header-cell">Время</div>

                      <div key={i} className={`grid-header-cell ${nowInfo.currentDay===i?'today':''}`}>{d}</div>

                          <div key={di} className={`day-cell ${nowInfo.currentDay===di?'today-col':''}`}>
                            {dayEvents.map(ev=>{
                              const club=CLUBS.find(c=>c.id===ev.clubId);
                              const goingCount=Object.values(ev.rsvp).filter(v=>v==='going').length;
                              return(
                                <div key={ev.id} className="event-card" style={{borderLeftColor:club?.color,background:`${club?.color}08`}} onClick={()=>setShowEventModal(ev)}>

                                  <div className="ec-room"><i className="fas fa-map-marker-alt" style={{marginRight:2,fontSize:8}}></i>{ROOMS.find(r=>r.id===ev.room)?.name}</div>

          <div className="mobile-schedule">
            <MobileCalendar events={filteredEvents} />
          </div>
        </div>
      )}

      {activeTab==='dashboard' && (
        <div>
          {/* Today's schedule */}
          <div className="section-title">Сегодня</div>
          {todayEvents.length===0?(
            <div className="card" style={{marginBottom:24}}><div className="card-body" style={{textAlign:'center',padding:32}}><p style={{color:'var(--gray-400)'}}>Нет запланированных событий</p></div></div>
          ):(
            <div style={{marginBottom:24}}>
              {todayEvents.map(ev=>{
                const club=CLUBS.find(c=>c.id===ev.clubId);
                const goingCount=Object.values(ev.rsvp).filter(v=>v==='going').length;
                const fillPct=Math.round(goingCount/ev.maxAttendees*100);
                return(
                  <div key={ev.id} className="event-full" onClick={()=>setShowEventModal(ev)}>
                    <div className="ef-top">
                      <div className="ef-color" style={{background:club?.color}}></div>
                      <div style={{flex:1}}>
                        <div className="ef-name" style={{color:club?.color}}>{ev.name}</div>
                        <div className="ef-meta">
                          <span><i className="fas fa-clock"></i>{TIME_SLOTS[ev.slot]?.start}</span>
                          <span><i className="fas fa-map-marker-alt"></i>{ROOMS.find(r=>r.id===ev.room)?.name}</span>
                          <span><i className="fas fa-users"></i>{goingCount}/{ev.maxAttendees} ({fillPct}%)</span>
                        </div>
                        <div style={{marginTop:8}}>
                          <div style={{height:4,borderRadius:2,background:'var(--gray-100)',overflow:'hidden'}}>
                            <div style={{height:'100%',borderRadius:2,background:club?.gradient||'var(--gradient-primary)',width:`${fillPct}%`,transition:'width 0.3s ease'}}></div>

                    </div>

              })}

          )}

          {/* Upcoming */}
          <div className="section-title">Ближайшие события</div>
          {upcomingEvents.map(ev=>{

              <div key={ev.id} className="event-full" onClick={()=>setShowEventModal(ev)}>
                <div className="ef-top">

                  <div style={{flex:1}}>
                    <div className="ef-name" style={{color:club?.color}}>{ev.name}</div>
                    <div className="ef-meta">
                      <span><i className="fas fa-calendar"></i>{DAYS[ev.day]}</span>
                      <span><i className="fas fa-clock"></i>{TIME_SLOTS[ev.slot]?.start}</span>
                      <span><i className="fas fa-map-marker-alt"></i>{ROOMS.find(r=>r.id===ev.room)?.name}</span>

                <div className="card-body">

                    const member=MEMBERS.find(m=>m.id===mid);

                      <div key={mid} className="member-row">

                clubEvents.forEach(e=>e.attendees.forEach(a=>clubMembers.add(a)));

                  <div key={club.id} className="card" style={{marginBottom:16}}>
                    <div style={{height:4,background:club.gradient}}></div>
                    <div className="card-body">
                      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
                        <div className="club-icon" style={{background:club.gradient,width:40,height:40,fontSize:16,marginBottom:0}}><i className={`fas ${club.icon}`}></i></div>

                      </div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                        {[...clubMembers].map(mid=>{
                          const m=MEMBERS.find(mm=>mm.id===mid);
                          return m?(
                            <span key={mid} style={{padding:'4px 10px',borderRadius:8,background:`${m.avatar}10`,color:m.avatar,fontSize:12,fontWeight:600}}>{m.name}</span>

                    </div>
                  </div>

        <div>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Бронирование помещений</h3>
          {ROOMS.map(room=>{
            const roomEvents=EVENTS.filter(e=>e.room===room.id);
            const busySlots=roomEvents.length;
            const totalSlots=7*7;
            const freePct=Math.round((1-busySlots/totalSlots)*100);
            return(
              <div key={room.id} className="card" style={{marginBottom:16}}>
                <div className="card-body">
                  <div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
                    <div>
                      <h3 style={{fontSize:16,fontWeight:700}}><i className="fas fa-door-open" style={{marginRight:8,color:'var(--primary)'}}></i>{room.name}</h3>
                      <p style={{fontSize:12,color:'var(--gray-500)'}}>Вместимость: {room.capacity} чел. • Тип: {room.type==='hall'?'Зал':room.type==='meeting'?'Переговорная':'Коворкинг'}</p>
                    </div>
                    <div style={{marginLeft:'auto',textAlign:'center'}}>
                      <div style={{fontSize:24,fontWeight:800,color:'var(--primary)'}}>{freePct}%</div>
                      <div style={{fontSize:11,color:'var(--gray-500)'}}>Свободно</div>
                    </div>
                  </div>
                  <div style={{marginTop:12}}>
                    <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>Занятость на неделю:</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                      {roomEvents.map(ev=>{
                        const club=CLUBS.find(c=>c.id===ev.clubId);
                        return(
                          <span key={ev.id} style={{padding:'3px 8px',borderRadius:6,background:`${club?.color}10`,fontSize:11,fontWeight:500,color:club?.color,borderLeft:`3px solid ${club?.color}`}}>
                            {DAYS[ev.day]} {TIME_SLOTS[ev.slot]?.start} — {ev.name}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Create event modal */}
      {showCreateModal && (
        <div className="modal-overlay" onClick={()=>setShowCreateModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Создать событие</h3>
            <div className="create-form">
              <div className="form-group">
                <label className="form-label">Название</label>
                <input className="form-input" placeholder="Введите название..." value={newEvent.name} onChange={e=>setNewEvent({...newEvent,name:e.target.value})}/>
              </div>
              <div className="form-group">
                <label className="form-label">Клуб</label>
                <select className="form-select" value={newEvent.clubId} onChange={e=>setNewEvent({...newEvent,clubId:e.target.value})}>
                  {CLUBS.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div className="form-group">
                  <label className="form-label">День</label>
                  <select className="form-select" value={newEvent.day} onChange={e=>setNewEvent({...newEvent,day:parseInt(e.target.value)})}>
                    {DAYS.map((d,i)=><option key={i} value={i}>{d}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Время</label>
                  <select className="form-select" value={newEvent.slot} onChange={e=>setNewEvent({...newEvent,slot:parseInt(e.target.value)})}>
                    {TIME_SLOTS.map((s,i)=><option key={i} value={i}>{s.start}</option>)}
                  </select>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div className="form-group">
                  <label className="form-label">Помещение</label>
                  <select className="form-select" value={newEvent.room} onChange={e=>setNewEvent({...newEvent,room:e.target.value})}>
                    {ROOMS.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Тип</label>
                  <select className="form-select" value={newEvent.type} onChange={e=>setNewEvent({...newEvent,type:e.target.value})}>
                    <option value="regular">Регулярное</option>
                    <option value="one-time">Разовое</option>
                    <option value="workshop">Мастер-класс</option>
                  </select>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Повторение (напр. «Каждый Вт 19:00»)</label>
                <input className="form-input" placeholder="Оставьте пустым для разового события" value={newEvent.recurring} onChange={e=>setNewEvent({...newEvent,recurring:e.target.value})}/>
              </div>
              <div className="form-group">
                <label className="form-label">Макс. участников</label>
                <input className="form-input" type="number" value={newEvent.maxAttendees} onChange={e=>setNewEvent({...newEvent,maxAttendees:parseInt(e.target.value)||20})}/>
              </div>
            </div>
            <div style={{display:'flex',gap:12,marginTop:20}}>
              <button className="btn btn-primary" onClick={handleCreateEvent} disabled={!newEvent.name}><i className="fas fa-plus"></i> Создать</button>
              <button className="btn" onClick={()=>setShowCreateModal(false)}>Отмена</button>
            </div>
          </div>
        </div>
      )}

      {/* Event detail modal */}
      {showEventModal && activeTab==='calendar' && (
        <div className="modal-overlay" onClick={()=>setShowEventModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            {(()=>{
              const ev=showEventModal;
              const club=CLUBS.find(c=>c.id===ev.clubId);
              const goingCount=Object.values(ev.rsvp).filter(v=>v==='going').length;
              const maybeCount=Object.values(ev.rsvp).filter(v=>v==='maybe').length;
              return(
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
                    <div style={{width:40,height:40,borderRadius:10,background:club?.gradient,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:16}}>
                      <i className={`fas ${club?.icon}`}></i>
                    </div>
                    <div>
                      <h3 style={{fontSize:16,fontWeight:700,color:club?.color}}>{ev.name}</h3>
                      <p style={{fontSize:12,color:'var(--gray-500)'}}>{club?.name}</p>
                    </div>
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
                    <span className="room-badge"><i className="fas fa-calendar"></i>{DAYS[ev.day]}</span>
                    <span className="room-badge"><i className="fas fa-clock"></i>{TIME_SLOTS[ev.slot]?.start}–{TIME_SLOTS[ev.slot]?.end}</span>
                    <span className="room-badge"><i className="fas fa-map-marker-alt"></i>{ROOMS.find(r=>r.id===ev.room)?.name}</span>
                    {ev.recurring && <span className="recurring-badge"><i className="fas fa-redo"></i>{ev.recurring}</span>}
                  </div>
                  <div style={{display:'flex',gap:8,marginBottom:16}}>
                    <span className="rsvp-badge rsvp-going"><i className="fas fa-check"></i>{goingCount} идут</span>
                    <span className="rsvp-badge rsvp-maybe"><i className="fas fa-question"></i>{maybeCount} могут</span>
                    <span className="rsvp-badge rsvp-none"><i className="fas fa-users"></i>{ev.maxAttendees} мест</span>
                  </div>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>Участники:</div>
                  {ev.attendees.map(mid=>{
                    const m=MEMBERS.find(mm=>mm.id===mid);
                    const rsvp=ev.rsvp[mid]||'none';
                    return(
                      <div key={mid} className="member-row">
                        <div className="member-avatar" style={{background:m?.avatar||'var(--gray-300)',width:28,height:28,fontSize:10}}>{m?.name.split(' ').map(n=>n[0]).join('')}</div>
                        <div className="member-name" style={{fontSize:12}}>{m?.name}</div>
                        <span className={`rsvp-badge rsvp-${rsvp}`} style={{fontSize:10}}>{rsvp==='going'?'Идёт':rsvp==='maybe'?'Может':'—'}</span>
                      </div>
                    );
                  })}
                  <div style={{marginTop:16}}><button className="btn" onClick={()=>setShowEventModal(null)}>Закрыть</button></div>
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

// Mobile calendar component
function MobileCalendar({events}){
  const[day,setDay]=useState(0);
  const nowInfo=getNowInfo();
  return(
    <div>
      <div className="mobile-day-tabs">
        {DAYS.map((d,i)=>(
          <button key={i} className={`mobile-day-tab ${day===i?'active':''}`} onClick={()=>setDay(i)}>
            {d}{nowInfo.currentDay===i&&<span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'var(--primary)',marginLeft:4}}></span>}
          </button>
        ))}
      </div>
      {events.filter(e=>e.day===day).sort((a,b)=>a.slot-b.slot).map(ev=>{
        const club=CLUBS.find(c=>c.id===ev.clubId);
        const goingCount=Object.values(ev.rsvp).filter(v=>v==='going').length;
        return(
          <div key={ev.id} className="event-full">
            <div className="ef-top">
              <div className="ef-color" style={{background:club?.color}}></div>
              <div style={{flex:1}}>
                <div className="ef-name" style={{color:club?.color}}>{ev.name}</div>
                <div className="ef-meta">
                  <span><i className="fas fa-clock"></i>{TIME_SLOTS[ev.slot]?.start}–{TIME_SLOTS[ev.slot]?.end}</span>
                  <span><i className="fas fa-map-marker-alt"></i>{ROOMS.find(r=>r.id===ev.room)?.name}</span>
                  <span><i className="fas fa-users"></i>{goingCount}/{ev.maxAttendees}</span>
                </div>
                <div style={{display:'flex',gap:6,marginTop:6}}>
                  {ev.recurring && <span className="recurring-badge"><i className="fas fa-redo" style={{fontSize:8}}></i>{ev.recurring}</span>}
                  <span className="rsvp-badge rsvp-going" style={{fontSize:10}}>{goingCount} идут</span>
                </div>
              </div>
            </div>
          </div>
        );
      })}
      {events.filter(e=>e.day===day).length===0 && (
        <div className="card"><div className="card-body" style={{textAlign:'center',padding:32}}><p style={{color:'var(--gray-400)'}}>Нет событий</p></div></div>
      )}
    </div>
  );
}

// MEMBER VIEW
// ═══════════════════════════════════════════
function MemberView(){
  const[activeTab,setActiveTab]=useState('calendar');
  const[myRsvp,setMyRsvp]=useState({'e1':'going','e6':'going','e15':'maybe','e2':'going','e10':'maybe'});
  const[myBookings,setMyBookings]=useState(['e1','e6','e15','e2','e10']);
  const[notifs,setNotifs]=useState({reminders:true,newEvents:false,changes:true});
  const nowInfo=getNowInfo();

  const handleRsvp=(eventId,status)=>{
    setMyRsvp(prev=>({...prev,[eventId]:status}));
    if(status==='going'&&!myBookings.includes(eventId)){
      setMyBookings(prev=>[...prev,eventId]);
    } else if(status!=='going'&&myBookings.includes(eventId)){
      setMyBookings(prev=>prev.filter(id=>id!==eventId));
    }
  };

  const myEvents=EVENTS.filter(e=>myBookings.includes(e.id));

  return(
    <div className="fade-in">
      <div className="tab-bar">
        <button className={`tab-btn ${activeTab==='calendar'?'active':''}`} onClick={()=>setActiveTab('calendar')}>Календарь</button>
        <button className={`tab-btn ${activeTab==='browse'?'active':''}`} onClick={()=>setActiveTab('browse')}>Секции</button>
        <button className={`tab-btn ${activeTab==='bookings'?'active':''}`} onClick={()=>setActiveTab('bookings')}>Мои записи</button>
        <button className={`tab-btn ${activeTab==='settings'?'active':''}`} onClick={()=>setActiveTab('settings')}>Настройки</button>
      </div>

      {activeTab==='calendar' && (
        <div>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Мой календарь</h3>
          {/* Desktop */}
          <div className="desktop-schedule">
            <div className="card">
              <div className="schedule-wrapper">
                <div style={{minWidth:900}}>
                  <div className="grid-header">
                    <div className="grid-header-cell">Время</div>
                    {DAYS.map((d,i)=>(<div key={i} className={`grid-header-cell ${nowInfo.currentDay===i?'today':''}`}>{d}</div>))}
                  </div>
                  {TIME_SLOTS.map((slot,si)=>(
                    <div key={si} className="grid-row">
                      <div className="time-cell"><span className="time">{slot.start}</span></div>
                      {DAYS.map((_,di)=>{
                        const dayEvents=myEvents.filter(e=>e.day===di&&e.slot===si);
                        return(
                          <div key={di} className={`day-cell ${nowInfo.currentDay===di?'today-col':''}`}>
                            {dayEvents.map(ev=>{
                              const club=CLUBS.find(c=>c.id===ev.clubId);
                              const myStatus=myRsvp[ev.id]||'none';
                              return(
                                <div key={ev.id} className="event-card" style={{borderLeftColor:club?.color,background:`${club?.color}08`}}>
                                  <div className="ec-name" style={{color:club?.color}}>{ev.name}</div>
                                  <div className="ec-room"><i className="fas fa-map-marker-alt" style={{marginRight:2,fontSize:8}}></i>{ROOMS.find(r=>r.id===ev.room)?.name}</div>
                                  <div className="ec-rsvp">
                                    <span className={`rsvp-badge rsvp-${myStatus}`} style={{fontSize:9,padding:'1px 6px'}}>
                                      {myStatus==='going'?'✓ Иду':myStatus==='maybe'?'? Может':'—'}
                                    </span>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
          {/* Mobile */}
          <div className="mobile-schedule">
            <MobileCalendar events={myEvents} />
          </div>
        </div>
      )}

      {activeTab==='browse' && (
        <div>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Доступные секции и мероприятия</h3>
          {CLUBS.map(club=>{
            const clubEvents=EVENTS.filter(e=>e.clubId===club.id);
            return(
              <div key={club.id} style={{marginBottom:24}}>
                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
                  <div className="club-icon" style={{background:club.gradient,marginBottom:0}}><i className={`fas ${club.icon}`}></i></div>
                  <div>
                    <h3 style={{fontSize:16,fontWeight:700}}>{club.name}</h3>
                    <p style={{fontSize:12,color:'var(--gray-500)'}}>{club.description}</p>
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12}}>
                  {clubEvents.map(ev=>{
                    const myStatus=myRsvp[ev.id];
                    const goingCount=Object.values(ev.rsvp).filter(v=>v==='going').length;
                    return(
                      <div key={ev.id} className="card">
                        <div className="card-body" style={{padding:16}}>
                          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                            <span style={{width:8,height:8,borderRadius:'50%',background:club.color}}></span>
                            <span style={{fontWeight:700,fontSize:14,color:club.color}}>{ev.name}</span>
                          </div>
                          <div style={{fontSize:12,color:'var(--gray-500)',display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
                            <span><i className="fas fa-calendar" style={{marginRight:3}}></i>{DAYS[ev.day]}</span>
                            <span><i className="fas fa-clock" style={{marginRight:3}}></i>{TIME_SLOTS[ev.slot]?.start}</span>
                            <span><i className="fas fa-map-marker-alt" style={{marginRight:3}}></i>{ROOMS.find(r=>r.id===ev.room)?.name}</span>
                          </div>
                          <div style={{display:'flex',gap:6,marginBottom:8}}>
                            <span className="rsvp-badge rsvp-going" style={{fontSize:10}}><i className="fas fa-check" style={{fontSize:8}}></i>{goingCount} идут</span>
                            {ev.recurring && <span className="recurring-badge" style={{fontSize:9}}><i className="fas fa-redo" style={{fontSize:8}}></i>{ev.recurring}</span>}
                            <span className="room-badge" style={{fontSize:9}}>{ev.type==='regular'?'Регулярное':ev.type==='workshop'?'Мастер-класс':'Разовое'}</span>
                          </div>
                          <div style={{display:'flex',gap:6}}>
                            {myStatus==='going'?(
                              <span style={{fontSize:12,fontWeight:600,color:'var(--success)'}}><i className="fas fa-check-circle" style={{marginRight:4}}></i>Вы идёте</span>
                            ):(
                              <>
                                <button className="btn btn-primary btn-sm" onClick={()=>handleRsvp(ev.id,'going')}><i className="fas fa-check"></i> Иду</button>
                                <button className="btn btn-sm" onClick={()=>handleRsvp(ev.id,'maybe')}><i className="fas fa-question"></i> Может</button>
                              </>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {activeTab==='bookings' && (
        <div>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Мои записи</h3>
          {myBookings.length===0?(
            <div className="card"><div className="card-body" style={{textAlign:'center',padding:32}}><p style={{color:'var(--gray-400)'}}>У вас пока нет записей</p></div></div>
          ):(
            myBookings.map(eid=>{
              const ev=EVENTS.find(e=>e.id===eid);
              if(!ev)return null;
              const club=CLUBS.find(c=>c.id===ev.clubId);
              const myStatus=myRsvp[ev.id]||'none';
              return(
                <div key={eid} className="event-full">
                  <div className="ef-top">
                    <div className="ef-color" style={{background:club?.color}}></div>
                    <div style={{flex:1}}>
                      <div className="ef-name" style={{color:club?.color}}>{ev.name}</div>
                      <div className="ef-meta">
                        <span><i className="fas fa-calendar"></i>{DAYS[ev.day]}</span>
                        <span><i className="fas fa-clock"></i>{TIME_SLOTS[ev.slot]?.start}–{TIME_SLOTS[ev.slot]?.end}</span>
                        <span><i className="fas fa-map-marker-alt"></i>{ROOMS.find(r=>r.id===ev.room)?.name}</span>
                      </div>
                      <div style={{display:'flex',gap:8,marginTop:8,alignItems:'center'}}>
                        <span className={`rsvp-badge rsvp-${myStatus}`}>
                          {myStatus==='going'?'✓ Иду':myStatus==='maybe'?'? Может':'—'}
                        </span>
                        {myStatus==='going'&&<button className="btn btn-sm" onClick={()=>handleRsvp(ev.id,'none')}><i className="fas fa-times"></i> Отменить</button>}
                        {myStatus==='maybe'&&<button className="btn btn-primary btn-sm" onClick={()=>handleRsvp(ev.id,'going')}><i className="fas fa-check"></i> Подтвердить</button>}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })
          )}
          <div style={{marginTop:16}}>
            <button className="btn" onClick={()=>{alert('Экспорт в .ics файл (демо)');}}><i className="fas fa-download"></i> Экспорт в календарь</button>
          </div>
        </div>
      )}

      {activeTab==='settings' && (
        <div className="card">
          <div className="card-body">
            <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}>Настройки уведомлений</h3>
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:14}}>Напоминания о событиях</div>
                  <div style={{fontSize:12,color:'var(--gray-500)'}}>Получать уведомления за 1 час до начала</div>
                </div>
                <div className={`toggle ${notifs.reminders?'on':''}`} onClick={()=>setNotifs(p=>({...p,reminders:!p.reminders}))}></div>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:14}}>Новые события</div>
                  <div style={{fontSize:12,color:'var(--gray-500)'}}>Уведомлять о новых мероприятиях в моих клубах</div>
                </div>
                <div className={`toggle ${notifs.newEvents?'on':''}`} onClick={()=>setNotifs(p=>({...p,newEvents:!p.newEvents}))}></div>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:14}}>Изменения расписания</div>
                  <div style={{fontSize:12,color:'var(--gray-500)'}}>Уведомлять об отменах и переносах</div>
                </div>
                <div className={`toggle ${notifs.changes?'on':''}`} onClick={()=>setNotifs(p=>({...p,changes:!p.changes}))}></div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════
function App(){
  const[role,setRole]=useState('organizer');
  const[mobileMenuOpen,setMobileMenuOpen]=useState(false);

  const roles=[
    {key:'organizer',label:'Организатор',icon:'fa-calendar-check'},
    {key:'member',label:'Участник',icon:'fa-user'},
  ];

  return(
    <div>
      <header className="app-header">
        <div className="container">
          <div className="header-inner">
            <a href="index.html" className="logo">
              <div className="logo-icon"><i className="fas fa-calendar-alt"></i></div>
              <div><div className="logo-text">Планово</div><div className="logo-sub">Демо: Клубы и мероприятия</div></div>
            </a>
            <div className="role-tabs-desktop role-tabs">
              {roles.map(r=>(
                <button key={r.key} className={`role-tab ${role===r.key?'active':''}`} onClick={()=>setRole(r.key)}>
                  <i className={`fas ${r.icon}`}></i> {r.label}
                </button>
              ))}
            </div>
            <button className="mobile-menu-btn" onClick={()=>setMobileMenuOpen(!mobileMenuOpen)}>
              <i className={`fas ${mobileMenuOpen?'fa-times':'fa-bars'}`}></i>
            </button>
          </div>
          {mobileMenuOpen&&(
            <div className="role-tabs-mobile" style={{paddingBottom:16,display:'flex',flexDirection:'column',gap:8}}>
              {roles.map(r=>(
                <button key={r.key} className={`role-tab ${role===r.key?'active':''}`} onClick={()=>{setRole(r.key);setMobileMenuOpen(false);}} style={{justifyContent:'flex-start'}}>
                  <i className={`fas ${r.icon}`}></i> {r.label}
                </button>
              ))}
            </div>
          )}
        </div>
      </header>
      <main className="main-content">
        <div className="container">
          <a href="index.html" className="back-link"><i className="fas fa-arrow-left"></i> Вернуться на сайт</a>
          {role==='organizer'&&<OrganizerView/>}
          {role==='member'&&<MemberView/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
