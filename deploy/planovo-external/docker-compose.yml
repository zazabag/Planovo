services:
  edge:
    image: caddy:2.8-alpine
    container_name: planovo-pro-edge
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./site:/srv/site:ro
      - ./caddy-data:/data
      - ./caddy-config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2019/config/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
