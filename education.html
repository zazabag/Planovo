<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #6366f1;
  --primary-light: #818cf8;
  --secondary: #8b5cf6;
  --accent: #06b6d4;
  --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
  --dark: #0f172a;
  --gray-600: #4b5563;
  --gray-500: #6b7280;
  --gray-400: #9ca3af;
  --gray-300: #d1d5db;
  --gray-200: #e5e7eb;
  --gray-100: #f3f4f6;
  --gray-50: #f9fafb;
  --white: #ffffff;
  --success: #10b981;
  --warning: #f59e0b;
  --error: #ef4444;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
  --shadow-xl: 0 20px 25px rgba(0,0,0,0.1);
  --transition: all 0.2s ease;
}
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--dark); background: var(--gray-50); line-height: 1.5; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
@media (min-width: 640px) { .container { padding: 0 24px; } }

/* Header */
.app-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--gray-200);
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 64px;
}
.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.logo-icon {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--gradient-primary);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 18px; box-shadow: var(--shadow-md);
}
.logo-text { font-weight: 800; font-size: 18px; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.logo-sub { font-size: 10px; color: var(--gray-500); display: none; }
@media (min-width: 640px) { .logo-sub { display: block; } }

.role-tabs { display: flex; gap: 8px; }
.role-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 10px; border: 1px solid var(--gray-200);
  background: #fff; font-size: 13px; font-weight: 600; color: var(--gray-600);
  cursor: pointer; transition: var(--transition); white-space: nowrap;
}
.role-tab:hover { border-color: var(--primary-light); color: var(--primary); }
.role-tab.active {
  background: var(--gradient-primary); color: #fff;
  border-color: transparent; box-shadow: var(--shadow-md);
}
.role-tab i { font-size: 14px; }

.mobile-menu-btn {
  display: flex; align-items: center; justify-content: center;
  width: 40px; height: 40px; border: none; background: none;
  color: var(--gray-600); font-size: 20px; cursor: pointer; border-radius: 8px;
}
.mobile-menu-btn:hover { background: var(--gray-100); }
@media (min-width: 768px) { .mobile-menu-btn { display: none; } .role-tabs-desktop { display: flex; } .role-tabs-mobile { display: none !important; } }
@media (max-width: 767px) { .role-tabs-desktop { display: none; } .role-tabs-mobile { display: flex; flex-direction: column; padding-bottom: 16px; gap: 8px; } }

.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--gray-500); font-size: 13px; font-weight: 500;
  text-decoration: none; padding: 8px 0; transition: var(--transition);
}
.back-link:hover { color: var(--primary); }

/* Main content */
.main-content { padding: 24px 0 48px; }

/* Cards */
.card {
  background: #fff; border: 1px solid var(--gray-200);
  border-radius: 16px; overflow: hidden;
}
.card-body { padding: 24px; }

/* Schedule grid */
.schedule-wrapper { overflow-x: auto; }
.schedule-grid { min-width: 900px; }
.grid-header {
  display: grid; grid-template-columns: 80px repeat(6, 1fr);
  border-bottom: 1px solid var(--gray-200);
}
.grid-header-cell {
  padding: 12px; text-align: center; font-size: 12px; font-weight: 600;
  color: var(--gray-500); border-right: 1px solid var(--gray-200);
}
.grid-header-cell:last-child { border-right: none; }
.grid-header-cell.today { color: var(--primary); background: rgba(99,102,241,0.05); }
.grid-row {
  display: grid; grid-template-columns: 80px repeat(6, 1fr);
  border-bottom: 1px solid var(--gray-200);
}
.grid-row:last-child { border-bottom: none; }
.grid-row.current-slot { background: rgba(99,102,241,0.03); }
.time-cell {
  padding: 8px; border-right: 1px solid var(--gray-200);
  display: flex; flex-direction: column; justify-content: center;
}
.time-cell .time { font-size: 11px; color: var(--gray-400); }
.time-cell .label { font-size: 9px; color: var(--gray-400); opacity: 0.7; }
.time-cell.current .time { color: var(--primary); font-weight: 600; }
.day-cell {
  padding: 6px; border-right: 1px solid var(--gray-200);
  min-height: 70px; position: relative;
}
.day-cell:last-child { border-right: none; }
.day-cell.today-col { background: rgba(99,102,241,0.02); }

/* Pair card (compact) */
.pair-card {
  padding: 8px; border-radius: 12px; border: 1px solid var(--gray-200);
  background: #fff; transition: var(--transition); position: relative;
}
.pair-card:hover { border-color: var(--primary-light); box-shadow: var(--shadow-sm); }
.pair-card.now {
  border-color: var(--primary-light); box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
  background: rgba(99,102,241,0.03);
}
.pair-card .subject-line { display: flex; align-items: flex-start; gap: 6px; }
.pair-card .color-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 3px; flex-shrink: 0; }
.pair-card .subject-name { font-size: 12px; font-weight: 700; line-height: 1.2; }
.pair-card .type-badge {
  display: inline-block; padding: 2px 6px; border-radius: 6px;
  font-size: 10px; font-weight: 600; margin-top: 4px;
}
.type-lek { background: #f3e8ff; color: #7c3aed; }
.type-pr { background: #dbeafe; color: #2563eb; }
.pair-card .info-line { display: flex; align-items: center; gap: 4px; margin-top: 4px; font-size: 10px; color: var(--gray-500); }
.pair-card .info-line i { font-size: 9px; }
.pair-card .extra-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.extra-badge {
  display: inline-block; padding: 1px 6px; border-radius: 6px;
  font-size: 9px; font-weight: 600;
}
.badge-combined { background: #fef3c7; color: #b45309; }
.badge-parity { background: #f3f4f6; color: #6b7280; }
.badge-now { background: var(--primary); color: #fff; }

/* Empty cell */
.empty-cell {
  display: flex; align-items: center; justify-content: center;
  min-height: 60px;
}
.empty-dots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; opacity: 0.2; }
.empty-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gray-400); }

/* Full pair card (mobile) */
.pair-full {
  padding: 16px; border-radius: 16px; border: 1px solid var(--gray-200);
  background: #fff; transition: var(--transition); position: relative;
}
.pair-full:hover { border-color: var(--primary-light); }
.pair-full.now {
  border-color: var(--primary-light); box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
  background: rgba(99,102,241,0.03);
}
.pair-full .subject-line { display: flex; align-items: center; gap: 8px; }
.pair-full .color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.pair-full .subject-name { font-size: 14px; font-weight: 700; }
.pair-full .type-badge { padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 600; }
.pair-full .info-line { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 13px; color: var(--gray-500); }
.pair-full .info-line i { font-size: 11px; }
.pair-full .extra-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.extra-badge-full { padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 600; }

/* Group selector */
.group-selector { display: flex; gap: 8px; flex-wrap: wrap; }
.group-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 14px; border-radius: 10px; border: 1px solid var(--gray-200);
  background: #fff; font-size: 13px; font-weight: 600; color: var(--gray-600);
  cursor: pointer; transition: var(--transition);
}
.group-btn:hover { border-color: var(--primary-light); color: var(--primary); }
.group-btn.active {
  background: var(--gradient-primary); color: #fff;
  border-color: transparent; box-shadow: var(--shadow-md);
}
.group-btn .course { font-size: 10px; opacity: 0.7; }

/* Parity selector */
.parity-selector { display: flex; align-items: center; gap: 12px; }
.parity-label { font-size: 13px; color: var(--gray-500); }
.parity-btn {
  padding: 6px 14px; border-radius: 10px; border: 1px solid var(--gray-200);
  background: #fff; font-size: 13px; font-weight: 600; color: var(--gray-600);
  cursor: pointer; transition: var(--transition);
}
.parity-btn:hover { border-color: var(--primary-light); color: var(--primary); }
.parity-btn.active {
  background: var(--gradient-primary); color: #fff;
  border-color: transparent; box-shadow: var(--shadow-md);
}

/* Teacher selector */
.teacher-select {
  padding: 8px 12px; border-radius: 10px; border: 1px solid var(--gray-200);
  font-size: 13px; font-family: inherit; background: #fff; color: var(--dark);
  min-width: 200px; cursor: pointer;
}

/* Now indicator */
.now-indicator {
  display: flex; align-items: center; gap: 12px;
  padding: 16px; border-radius: 16px;
  border: 1px solid rgba(99,102,241,0.3);
  background: rgba(99,102,241,0.05); margin-bottom: 16px;
}
.now-pulse {
  position: relative; width: 12px; height: 12px;
}
.now-pulse::before {
  content: ''; position: absolute; inset: 0;
  border-radius: 50%; background: var(--primary);
  animation: pulse-ring 1.5s ease-out infinite;
}
.now-pulse::after {
  content: ''; position: absolute; inset: 2px;
  border-radius: 50%; background: var(--primary);
}
@keyframes pulse-ring {
  0% { transform: scale(1); opacity: 0.75; }
  100% { transform: scale(2.5); opacity: 0; }
}

/* Availability grid */
.avail-grid { min-width: 600px; }
.avail-btn {
  width: 100%; height: 40px; border-radius: 10px;
  border: 2px solid; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: var(--transition); font-size: 14px;
}
.avail-btn.available { background: #d1fae5; border-color: #6ee7b7; color: #059669; }
.avail-btn.available:hover { background: #a7f3d0; }
.avail-btn.unavailable { background: #f3f4f6; border-color: #d1d5db; color: #9ca3af; }
.avail-btn.unavailable:hover { background: #e5e7eb; }

/* Button */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-radius: 12px; border: 1px solid var(--gray-200);
  background: #fff; font-size: 13px; font-weight: 600; font-family: inherit;
  color: var(--gray-600); cursor: pointer; transition: var(--transition);
}
.btn:hover { border-color: var(--primary-light); color: var(--primary); }
.btn-primary {
  background: var(--gradient-primary); color: #fff;
  border-color: transparent; box-shadow: var(--shadow-md);
}
.btn-primary:hover { box-shadow: var(--shadow-lg); opacity: 0.95; color: #fff; }
.btn-sm { padding: 6px 14px; font-size: 12px; }

/* Tabs */
.tab-bar { display: flex; gap: 4px; background: var(--gray-100); border-radius: 12px; padding: 4px; margin-bottom: 16px; }
.tab-btn {
  flex: 1; padding: 8px 16px; border: none; background: none;
  border-radius: 10px; font-size: 13px; font-weight: 600;
  color: var(--gray-500); cursor: pointer; transition: var(--transition);
  font-family: inherit;
}
.tab-btn:hover { color: var(--gray-600); }
.tab-btn.active { background: #fff; color: var(--dark); box-shadow: var(--shadow-sm); }

/* Mobile schedule */
.mobile-schedule { display: none; }
@media (max-width: 1023px) { .desktop-schedule { display: none; } .mobile-schedule { display: block; } }
@media (min-width: 1024px) { .desktop-schedule { display: block; } .mobile-schedule { display: none; } }

.mobile-day-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 16px; }
.mobile-day-tab {
  padding: 8px 16px; border-radius: 10px; border: 1px solid var(--gray-200);
  background: #fff; font-size: 13px; font-weight: 600;
  color: var(--gray-500); cursor: pointer; transition: var(--transition);
  white-space: nowrap;
}
.mobile-day-tab:hover { border-color: var(--primary-light); }
.mobile-day-tab.active { background: var(--gradient-primary); color: #fff; border-color: transparent; }

.mobile-slot { margin-bottom: 12px; }
.mobile-slot-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.mobile-slot-time { font-size: 12px; font-weight: 600; color: var(--gray-500); }
.mobile-slot-label { font-size: 10px; color: var(--gray-400); }
.mobile-slot-now { font-size: 9px; font-weight: 600; padding: 2px 8px; border-radius: 6px; background: var(--primary); color: #fff; }

.empty-slot {
  padding: 16px; border-radius: 16px; border: 1px dashed var(--gray-200);
  background: rgba(243,244,246,0.5); text-align: center;
}
.empty-slot p { font-size: 12px; color: var(--gray-400); }

/* Admin view */
.admin-header { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; }
.stat-card {
  padding: 20px; border-radius: 16px; border: 1px solid var(--gray-200);
  background: #fff;
}
.stat-card .stat-value { font-size: 28px; font-weight: 800; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.stat-card .stat-label { font-size: 12px; color: var(--gray-500); margin-top: 4px; }

.conflict-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.conflict-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-radius: 10px; font-size: 12px; font-weight: 500;
}
.conflict-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
.conflict-warning { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }

/* Auto-gen */
.progress-list { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
.progress-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--gray-600);
}
.progress-item .spinner { width: 14px; height: 14px; border: 2px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.progress-item.done { color: var(--success); }
.progress-item.done::before { content: '✓'; font-weight: 700; }

/* Section spacing */
.section { margin-bottom: 24px; }
.section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }

/* Search input */
.search-input {
  padding: 8px 12px 8px 36px; border-radius: 10px; border: 1px solid var(--gray-200);
  font-size: 13px; font-family: inherit; width: 100%; max-width: 300px;
  background: #fff; color: var(--dark);
}
.search-input:focus { outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
.search-wrapper { position: relative; }
.search-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray-400); font-size: 13px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

/* Fade in animation */
@keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeInUp 0.3s ease-out; }

/* Additional responsive styles */
@media (max-width: 640px) {
  .grid-header { grid-template-columns: 60px repeat(6, 1fr) !important; }
  .grid-row { grid-template-columns: 60px repeat(6, 1fr) !important; }
  .time-cell .time { font-size: 9px; }
  .pair-card { padding: 4px; }
  .pair-card .subject-name { font-size: 10px; }
  .pair-card .info-line { font-size: 9px; }
  .stat-card { padding: 12px; }
  .stat-card .stat-value { font-size: 22px; }
  .btn { padding: 8px 14px; font-size: 12px; }
  .role-tab { padding: 6px 12px; font-size: 12px; }
  .group-btn { padding: 4px 10px; font-size: 12px; }
  .parity-btn { padding: 4px 10px; font-size: 12px; }
}

@media (max-width: 480px) {
  .header-inner { height: 56px; }
  .logo-icon { width: 32px; height: 32px; font-size: 14px; }
  .logo-text { font-size: 15px; }
  .main-content { padding: 16px 0 32px; }
  .card-body { padding: 16px; }
  .section-title { font-size: 14px; }
}

/* Print styles */
@media print {
  .app-header { position: static; }
  .back-link { display: none; }
  .role-tabs { display: none; }
  .mobile-menu-btn { display: none; }
  .btn { border: 1px solid #000; }
  .pair-card { break-inside: avoid; }
  .card { break-inside: avoid; }
}

/* Focus styles for accessibility */
.btn:focus-visible, .role-tab:focus-visible, .group-btn:focus-visible, .parity-btn:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
}

/* Skip link for accessibility */
.skip-link {
  position: absolute; top: -40px; left: 0; background: var(--primary); color: #fff;
  padding: 8px; z-index: 100; transition: top 0.2s;
}
.skip-link:focus { top: 0; }
</style>
</head>

// ═══════════════════════════════════════════════
// PRNG: mulberry32 seeded by FNV-1a hash
// ═══════════════════════════════════════════════
function fnv1a(str) {
  let hash = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    hash ^= str.charCodeAt(i);
    hash = Math.imul(hash, 0x01000193);
  }
  return hash >>> 0;
}
function mulberry32(seed) {
  let state = seed;
  return () => {
    state |= 0;
    state = (state + 0x6d2b79f5) | 0;
    let t = Math.imul(state ^ (state >>> 15), 1 | state);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;

}

// ═══════════════════════════════════════════════
// Schedule generation (deterministic)
// ═══════════════════════════════════════════════
let _cellCounter = 0;
function nextCellId() { return `cell-${++_cellCounter}`; }

function generateSchedule(seed = "planovo-demo-2025") {
  _cellCounter = 0;
  const rng = mulberry32(fnv1a(seed));
  const cells = [];
  const LECTURE_ROOMS = ROOMS.filter(r => r.type === "lecture").map(r => r.id);
  const LAB_ROOMS = ROOMS.filter(r => r.type === "lab").map(r => r.id);

  const teacherDailyLoad = {};
  for (const t of TEACHERS) { teacherDailyLoad[t.id] = {}; for (const d of DAYS) teacherDailyLoad[t.id][d.key] = 0; }
  const groupDailyLoad = {};
  for (const g of GROUPS) { groupDailyLoad[g.code] = {}; for (const d of DAYS) groupDailyLoad[g.code][d.key] = 0; }
  const teacherSlotOccupied = {};
  for (const t of TEACHERS) teacherSlotOccupied[t.id] = new Set();

  function pickRoom(subjectId) {
    const s = subjectMap.get(subjectId);
    if (s && (s.id === "s14" || s.name.toLowerCase().includes("лаб"))) return LAB_ROOMS[Math.floor(rng() * LAB_ROOMS.length)];
    return LECTURE_ROOMS[Math.floor(rng() * LECTURE_ROOMS.length)];
  }

  for (const tsa of TEACHER_SUBJECTS) {
    const { teacherId, subjectId, groupCodes } = tsa;
    const teacher = teacherMap.get(teacherId);
    for (const groupCode of groupCodes) {
      const useParity = rng() < 0.25;
      const parities = useParity ? (rng() < 0.5 ? ["even"] : ["odd"]) : ["even", "odd"];
      let placed = false;
      let attempt = 0;
      while (!placed && attempt < 50) {
        attempt++;
        const isSaturday = rng() < 0.15;
        const dayKey = isSaturday ? "sat" : DAYS[Math.floor(rng() * 5)].key;
        const isSatDay = dayKey === "sat";
        const maxSlot = isSatDay ? 3 : 5;
        const slotIndex = Math.floor(rng() * maxSlot);
        if ((teacherDailyLoad[teacherId][dayKey] || 0) >= teacher.maxDaily) continue;
        const currentWeekly = Object.values(teacherDailyLoad[teacherId]).reduce((a, b) => a + b, 0);
        if (currentWeekly >= teacher.maxWeekly) break;
        if ((groupDailyLoad[groupCode][dayKey] || 0) >= (isSatDay ? 3 : 5)) continue;
        let slotOk = true;
        for (const p of parities) {
          if (teacherSlotOccupied[teacherId].has(`${dayKey}:${slotIndex}:${p}`)) { slotOk = false; break; }
        }
        if (!slotOk) continue;
        const existing = cells.find(c => c.groupCode === groupCode && c.dayKey === dayKey && c.slotIndex === slotIndex && parities.includes(c.parity));
        if (existing) continue;
        const roomId = pickRoom(subjectId);
        for (const parity of parities) {
          cells.push({ id: nextCellId(), groupCode, dayKey, slotIndex, parity, subjectId, teacherId, roomId, combined: false });
          teacherSlotOccupied[teacherId].add(`${dayKey}:${slotIndex}:${parity}`);
        }
        teacherDailyLoad[teacherId][dayKey] = (teacherDailyLoad[teacherId][dayKey] || 0) + 1;
        groupDailyLoad[groupCode][dayKey] = (groupDailyLoad[groupCode][dayKey] || 0) + 1;
        placed = true;
      }
    }
  }

  // Combined pairs
  const combinedPairs = [
    [["ОЭ-11", "ОЭ-12"], { subjectId: "s2", teacherId: "t7" }],
    [["ОЭ-21", "ОЭ-22"], { subjectId: "s11", teacherId: "t4" }],
    [["ОЭ-31", "ОЭ-32"], { subjectId: "s6", teacherId: "t6" }],
  ];
  for (const [groups, info] of combinedPairs) {
    const dayKey = DAYS[Math.floor(rng() * 5)].key;
    const slotIndex = Math.floor(rng() * 4);
    const roomId = pickRoom(info.subjectId);
    const combinedKey = `combined-${groups[0]}-${groups[1]}-${info.subjectId}`;
    for (const g of groups) {
      const idx = cells.findIndex(c => c.groupCode === g && c.dayKey === dayKey && c.slotIndex === slotIndex);
      if (idx >= 0) {
        const removed = cells.splice(idx, 1)[0];
        teacherSlotOccupied[removed.teacherId]?.delete(`${removed.dayKey}:${removed.slotIndex}:${removed.parity}`);
      }
    }
    for (const parity of ["even", "odd"]) {
      const tSlotKey = `${dayKey}:${slotIndex}:${parity}`;
      if (!teacherSlotOccupied[info.teacherId].has(tSlotKey)) {
        for (const groupCode of groups) {
          cells.push({ id: nextCellId(), groupCode, dayKey, slotIndex, parity, subjectId: info.subjectId, teacherId: info.teacherId, roomId, combined: true, combinedKey });
        }
        teacherSlotOccupied[info.teacherId].add(tSlotKey);
      }
    }
  }

  // Parity-only subjects
  const parityOnly = [
    { groupCode: "ОЭ-11", subjectId: "s14", teacherId: "t2" },
    { groupCode: "ОЭ-12", subjectId: "s14", teacherId: "t2" },
    { groupCode: "ОЭ-21", subjectId: "s3", teacherId: "t12" },
    { groupCode: "ОЭ-22", subjectId: "s3", teacherId: "t12" },
    { groupCode: "ОЭ-31", subjectId: "s9", teacherId: "t8" },
    { groupCode: "ОЭ-32", subjectId: "s9", teacherId: "t8" },
  ];
  for (const pos of parityOnly) {
    const parity = rng() < 0.5 ? "even" : "odd";
    const dayKey = DAYS[Math.floor(rng() * 5)].key;
    const slotIndex = Math.floor(rng() * 4);
    const roomId = pickRoom(pos.subjectId);
    const existing = cells.find(c => c.groupCode === pos.groupCode && c.dayKey === dayKey && c.slotIndex === slotIndex && c.parity === parity);
    if (existing) continue;
    const tSlotKey = `${dayKey}:${slotIndex}:${parity}`;
    if (teacherSlotOccupied[pos.teacherId].has(tSlotKey)) continue;
    cells.push({ id: nextCellId(), groupCode: pos.groupCode, dayKey, slotIndex, parity, subjectId: pos.subjectId, teacherId: pos.teacherId, roomId, combined: false });
    teacherSlotOccupied[pos.teacherId].add(tSlotKey);
  }

  return cells;
}

function generateAvailability(seed = "planovo-avail-2025") {
  const rng = mulberry32(fnv1a(seed));
  const result = {};
  for (const teacher of TEACHERS) {
    const blockedSlots = new Set();
    const numBlocked = 2 + Math.floor(rng() * 3);
    for (let i = 0; i < numBlocked; i++) {
      blockedSlots.add(`${DAYS[Math.floor(rng() * DAYS.length)].key}:${Math.floor(rng() * TIME_SLOTS.length)}`);
    }
    const cells = [];
    for (const day of DAYS) {
      const maxSlot = day.key === "sat" ? 3 : TIME_SLOTS.length;
      for (let si = 0; si < maxSlot; si++) {
        if (!blockedSlots.has(`${day.key}:${si}`)) {
          cells.push({ dayKey: day.key, slotIndex: si, parity: "even" });
          cells.push({ dayKey: day.key, slotIndex: si, parity: "odd" });
        }
      }
    }
    result[teacher.id] = { teacherId: teacher.id, cells, submittedParities: ["even", "odd"] };
  }
  return result;
}

// ═══════════════════════════════════════════════
// Build schedule from cells
// ═══════════════════════════════════════════════
function buildEmptyWeek() {
  const week = {};
  for (const d of DAYS) {
    week[d.key] = {};
    for (let i = 0; i < TIME_SLOTS.length; i++) {
      week[d.key][i] = { even: null, odd: null };
    }
  }
  return week;
}

function buildGroupSchedule(cells, groupCode) {
  const week = buildEmptyWeek();
  const groupCells = cells.filter(c => c.groupCode === groupCode);
  const combinedKeyGroups = {};
  for (const cell of cells) {
    if (cell.combinedKey) {
      if (!combinedKeyGroups[cell.combinedKey]) combinedKeyGroups[cell.combinedKey] = [];
      if (!combinedKeyGroups[cell.combinedKey].includes(cell.groupCode)) combinedKeyGroups[cell.combinedKey].push(cell.groupCode);
    }
  }
  for (const cell of groupCells) {
    const subject = subjectMap.get(cell.subjectId);
    const teacher = teacherMap.get(cell.teacherId);
    const room = roomMap.get(cell.roomId);
    if (!subject || !teacher || !room) continue;
    const extraGroups = cell.combinedKey ? combinedKeyGroups[cell.combinedKey] : undefined;
    week[cell.dayKey][cell.slotIndex][cell.parity] = { subject, teacher, room, parity: cell.parity, combined: cell.combined, groups: extraGroups };
  }
  return week;
}

function buildTeacherSchedule(cells, teacherId) {
  const week = buildEmptyWeek();
  const teacherCells = cells.filter(c => c.teacherId === teacherId);
  for (const cell of teacherCells) {
    const subject = subjectMap.get(cell.subjectId);
    const teacher = teacherMap.get(cell.teacherId);
    const room = roomMap.get(cell.roomId);
    if (!subject || !teacher || !room) continue;
    const sameSlotCells = cells.filter(c2 => c2.dayKey === cell.dayKey && c2.slotIndex === cell.slotIndex && c2.parity === cell.parity && c2.teacherId === teacherId);
    const groupCodes = [...new Set(sameSlotCells.map(c => c.groupCode))];
    week[cell.dayKey][cell.slotIndex][cell.parity] = { subject, teacher, room, parity: cell.parity, combined: cell.combined, groups: groupCodes };
  }
  return week;
}

function getConflicts(cells, availabilities) {
  const conflicts = [];
  const slotMap = {};
  for (const cell of cells) {
    const key = `${cell.dayKey}:${cell.slotIndex}:${cell.parity}`;
    if (!slotMap[key]) slotMap[key] = [];
    slotMap[key].push(cell);
  }
  for (const [slotKey, slotCells] of Object.entries(slotMap)) {
    // Group conflicts
    const byGroup = {};
    for (const c of slotCells) { if (!byGroup[c.groupCode]) byGroup[c.groupCode] = []; byGroup[c.groupCode].push(c); }
    for (const [gc, gcCells] of Object.entries(byGroup)) {
      if (gcCells.length > 1) {
        const nonCombined = gcCells.filter(c => !c.combinedKey);
        if (nonCombined.length > 1) conflicts.push({ severity: "error", msg: `Группа ${gc}: конфликт — ${gcCells.length} занятий в ${slotKey}` });
      }
    }
    // Teacher conflicts
    const byTeacher = {};
    for (const c of slotCells) { if (!byTeacher[c.teacherId]) byTeacher[c.teacherId] = []; byTeacher[c.teacherId].push(c); }
    for (const [tid, tcCells] of Object.entries(byTeacher)) {
      const teacher = teacherMap.get(tid);
      const nonCombined = tcCells.filter(c => !c.combinedKey);
      if (nonCombined.length > 1) conflicts.push({ severity: "error", msg: `${teacher?.full || tid}: конфликт в ${slotKey}` });
    }
  }
  // Availability warnings
  for (const cell of cells) {
    const avail = availabilities[cell.teacherId];
    if (avail) {
      const isAvailable = avail.cells.some(ac => ac.dayKey === cell.dayKey && ac.slotIndex === cell.slotIndex && ac.parity === cell.parity);
      if (!isAvailable) {
        const teacher = teacherMap.get(cell.teacherId);
        conflicts.push({ severity: "warning", msg: `${teacher?.full || cell.teacherId}: занятие вне доступного времени` });
      }
    }
  }
  return conflicts;
}

// ═══════════════════════════════════════════════
// Now info
// ═══════════════════════════════════════════════
function getNowInfo() {
  const now = new Date();
  const dayOfWeek = now.getDay();
  const dayMap = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
  const currentDay = dayMap[dayOfWeek] || "mon";
  const minutes = now.getHours() * 60 + now.getMinutes();
  let currentSlot = null, nextSlot = null, isLive = false, timeToNext = 0;
  for (const slot of TIME_SLOTS) {
    if (minutes >= slot.startMin && minutes <= slot.endMin) { currentSlot = slot.index; isLive = true; timeToNext = slot.endMin - minutes; }
  }
  if (currentSlot !== null) {
    for (let i = currentSlot + 1; i < TIME_SLOTS.length; i++) { if (TIME_SLOTS[i]) { nextSlot = i; break; } }
  } else {
    for (const slot of TIME_SLOTS) { if (minutes < slot.startMin) { nextSlot = slot.index; timeToNext = slot.startMin - minutes; break; } }
  }
  return { currentSlot, nextSlot, currentDay, isLive, timeToNext };
}

function StudentView({ cells, currentParity, selectedGroupCode, setSelectedGroupCode }) {
  const [searchQuery, setSearchQuery] = useState('');

  const [nowInfo, setNowInfo] = useState({ currentSlot: null, nextSlot: null, currentDay: 'mon', isLive: false, timeToNext: 0 });

  useEffect(() => {
    const update = () => setNowInfo(getNowInfo());

  }, []);

  const weekSchedule = useMemo(() => {

    return buildGroupSchedule(cells, selectedGroupCode);
  }, [cells, selectedGroupCode]);

  const filteredGroups = useMemo(() => {
    if (!searchQuery.trim()) return GROUPS;
    const q = searchQuery.toLowerCase();
    return GROUPS.filter(g => g.code.toLowerCase().includes(q) || g.direction.toLowerCase().includes(q));
  }, [searchQuery]);

  const getDisplayPair = (dayKey, slotIndex) => {
    if (!weekSchedule?.[dayKey]?.[slotIndex]) return null;
    const pair = weekSchedule[dayKey][slotIndex][currentParity];
    if (pair) return pair;
    const otherParity = currentParity === "even" ? "odd" : "even";
    return weekSchedule[dayKey][slotIndex][otherParity] ?? null;
  };

  const isCurrentDay = (dk) => nowInfo.currentDay === dk;
  const isCurrentSlot = (si) => nowInfo.currentSlot === si;
  const isNowPair = (dk, si) => isCurrentDay(dk) && isCurrentSlot(si);

  const nowPair = useMemo(() => {
    if (!nowInfo.isLive || !weekSchedule || !selectedGroupCode) return null;
    const si = nowInfo.currentSlot ?? 0;
    const dk = nowInfo.currentDay;
    return weekSchedule?.[dk]?.[si]?.[currentParity] ?? weekSchedule?.[dk]?.[si]?.[currentParity === "even" ? "odd" : "even"] ?? null;
  }, [nowInfo, weekSchedule, selectedGroupCode, currentParity]);

  const selectedGroup = groupMap.get(selectedGroupCode);

  if (!selectedGroupCode) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '80px 16px' }}>
        <div style={{ width: 56, height: 56, borderRadius: 16, background: 'var(--gradient-primary)', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 16 }}>
          <i className="fas fa-search" style={{ color: '#fff', fontSize: 22 }}></i>
        </div>
        <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 8 }}>Выберите группу</h2>
        <p style={{ color: 'var(--gray-500)', textAlign: 'center' }}>Выберите группу для просмотра расписания</p>
      </div>
    );
  }

  return (
    <div className="fade-in">
      {/* Group selector */}
      <div className="section">
        <div className="search-wrapper" style={{ marginBottom: 12 }}>
          <i className="fas fa-search"></i>
          <input className="search-input" placeholder="Поиск группы..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
        </div>
        <div className="group-selector">
          {filteredGroups.map(g => (
            <button key={g.code} className={`group-btn ${selectedGroupCode === g.code ? 'active' : ''}`} onClick={() => setSelectedGroupCode(g.code)}>
              <span style={{ fontWeight: 700 }}>{g.code}</span>
              <span className="course">{g.course} курс</span>
            </button>
          ))}
        </div>
      </div>

      {/* Parity */}
      <div className="section">
        <div className="parity-selector">
          <span className="parity-label">Неделя:</span>
          <button className={`parity-btn ${currentParity === 'even' ? 'active' : ''}`} onClick={() => {/* handled by parent */}}>Чётная</button>
          <button className={`parity-btn ${currentParity === 'odd' ? 'active' : ''}`} onClick={() => {/* handled by parent */}}>Нечётная</button>
        </div>
      </div>

      {/* Now indicator */}
      {nowInfo.isLive && (
        <div className="now-indicator">
          <div className="now-pulse"></div>
          <div style={{ flex: 1 }}>
            {nowPair ? (
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                <span style={{ fontSize: 13, fontWeight: 500 }}>Сейчас:</span>
                <span style={{ fontWeight: 700, fontSize: 13, color: nowPair.subject.color }}>{nowPair.subject.name}</span>
                <span style={{ fontSize: 10, padding: '2px 8px', borderRadius: 100, background: 'rgba(99,102,241,0.1)', color: 'var(--primary)', fontWeight: 600 }}>
                  <i className="fas fa-clock" style={{ marginRight: 4 }}></i>
                  до {TIME_SLOTS[nowInfo.currentSlot ?? 0]?.end}
                </span>
              </div>
            ) : (
              <p style={{ fontSize: 13, color: 'var(--gray-500)' }}>Окно — сейчас нет занятия</p>
            )}
          </div>
          {nowInfo.nextSlot !== null && (
            <div style={{ fontSize: 11, color: 'var(--gray-400)', display: 'flex', alignItems: 'center', gap: 4 }}>
              <i className="fas fa-chevron-right"></i>След: {TIME_SLOTS[nowInfo.nextSlot]?.label}
            </div>
          )}
        </div>
      )}

      {/* Selected group info */}
      {selectedGroup && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 16 }}>
          <span style={{ padding: '2px 10px', borderRadius: 100, fontSize: 11, fontWeight: 600, background: 'rgba(99,102,241,0.1)', color: 'var(--primary)' }}>{selectedGroup.code}</span>
          <span style={{ fontSize: 13, color: 'var(--gray-500)' }}>{selectedGroup.direction} • {selectedGroup.course} курс</span>
        </div>
      )}

      {/* Desktop grid */}
      <div className="desktop-schedule">
        <div className="card">
          <div className="schedule-wrapper">
            <div className="schedule-grid">
              <div className="grid-header">
                <div className="grid-header-cell">Время</div>
                {DAYS.map(d => (
                  <div key={d.key} className={`grid-header-cell ${isCurrentDay(d.key) ? 'today' : ''}`}>
                    <div>{d.full}</div>
                    {isCurrentDay(d.key) && <div style={{ marginTop: 2, fontSize: 9, padding: '1px 6px', borderRadius: 4, background: 'var(--primary)', color: '#fff', fontWeight: 600, display: 'inline-block' }}>Сегодня</div>}
                  </div>
                ))}
              </div>
              {TIME_SLOTS.slice(0, 6).map(slot => (
                <div key={slot.index} className={`grid-row ${isCurrentSlot(slot.index) ? 'current-slot' : ''}`}>
                  <div className={`time-cell ${isCurrentSlot(slot.index) ? 'current' : ''}`}>
                    <span className="time">{slot.start}–{slot.end}</span>
                    <span className="label">{slot.label}</span>
                  </div>
                  {DAYS.map(d => {
                    const pair = getDisplayPair(d.key, slot.index);
                    return (
                      <div key={d.key} className={`day-cell ${isCurrentDay(d.key) ? 'today-col' : ''}`}>
                        {pair ? (
                          <PairCardCompact pair={pair} isNow={isNowPair(d.key, slot.index)} currentParity={currentParity} />
                        ) : (
                          <div className="empty-cell">
                            <div className="empty-dots">{[0,1,2].map(i => <div key={i} className="empty-dot"></div>)}</div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Mobile schedule */}
      <div className="mobile-schedule">
        <div className="mobile-day-tabs">
          {DAYS.map(d => (
            <button key={d.key} className={`mobile-day-tab ${mobileDay === d.key ? 'active' : ''}`} onClick={() => setMobileDay(d.key)}>
              {d.short}
              {isCurrentDay(d.key) && <span style={{ display: 'inline-block', width: 6, height: 6, borderRadius: '50%', background: 'var(--primary)', marginLeft: 4 }}></span>}
            </button>
          ))}
        </div>
        <div>
          {TIME_SLOTS.slice(0, 6).map(slot => {
            const pair = getDisplayPair(mobileDay, slot.index);
            return (
              <div key={slot.index} className="mobile-slot">
                <div className="mobile-slot-header">
                  <span className={`mobile-slot-time ${isNowPair(mobileDay, slot.index) ? '' : ''}`} style={isNowPair(mobileDay, slot.index) ? { color: 'var(--primary)' } : {}}>
                    {slot.start}–{slot.end}
                  </span>
                  <span className="mobile-slot-label">{slot.label}</span>
                  {isNowPair(mobileDay, slot.index) && <span className="mobile-slot-now">Сейчас</span>}
                </div>
                {pair ? (
                  <PairCardFull pair={pair} isNow={isNowPair(mobileDay, slot.index)} currentParity={currentParity} />
                ) : (
                  <div className="empty-slot"><p>Нет занятия</p></div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Teacher View ──
function TeacherView({ cells, currentParity, selectedTeacherId, setSelectedTeacherId, availabilities, setAvailability }) {
  const [availParity, setAvailParity] = useState('even');
  const [localAvail, setLocalAvail] = useState({});
  const [activeTab, setActiveTab] = useState('schedule');
  const [saved, setSaved] = useState(false);

  const weekSchedule = useMemo(() => {
    if (!selectedTeacherId) return null;
    return buildTeacherSchedule(cells, selectedTeacherId);
  }, [cells, selectedTeacherId]);

  const teacherAvail = selectedTeacherId ? availabilities[selectedTeacherId] : null;

  const initLocalAvail = useCallback(() => {
    if (!teacherAvail) return;
    const map = {};
    for (const day of DAYS) {
      const maxSlot = day.key === "sat" ? 3 : TIME_SLOTS.length;
      for (let si = 0; si < maxSlot; si++) {
        const key = `${day.key}:${si}:${availParity}`;
        map[key] = teacherAvail.cells.some(c => c.dayKey === day.key && c.slotIndex === si && c.parity === availParity);
      }
    }
    setLocalAvail(map);
  }, [teacherAvail, availParity]);

  useEffect(() => { initLocalAvail(); }, [initLocalAvail]);

  const toggleAvailCell = (dayKey, slotIndex) => {
    const key = `${dayKey}:${slotIndex}:${availParity}`;
    setLocalAvail(prev => ({ ...prev, [key]: !prev[key] }));
  };

  const submitAvailability = () => {
    if (!selectedTeacherId) return;
    const newCells = [];
    for (const day of DAYS) {
      const maxSlot = day.key === "sat" ? 3 : TIME_SLOTS.length;
      for (let si = 0; si < maxSlot; si++) {
        for (const p of ["even", "odd"]) {
          const key = `${day.key}:${si}:${p}`;
          if (p === availParity) {
            if (localAvail[key]) newCells.push({ dayKey: day.key, slotIndex: si, parity: p });
          } else {
            const isAvail = teacherAvail?.cells.some(c => c.dayKey === day.key && c.slotIndex === si && c.parity === p);
            if (isAvail) newCells.push({ dayKey: day.key, slotIndex: si, parity: p });
          }
        }
      }
    }
    setAvailability(selectedTeacherId, { teacherId: selectedTeacherId, cells: newCells, submittedParities: [...new Set([...(teacherAvail?.submittedParities || []), availParity])] });
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const copyFromOtherParity = () => {
    const otherParity = availParity === "even" ? "odd" : "even";
    const newLocalAvail = { ...localAvail };
    for (const day of DAYS) {
      const maxSlot = day.key === "sat" ? 3 : TIME_SLOTS.length;
      for (let si = 0; si < maxSlot; si++) {
        const targetKey = `${day.key}:${si}:${availParity}`;
        const sourceAvail = teacherAvail?.cells.some(c => c.dayKey === day.key && c.slotIndex === si && c.parity === otherParity);
        newLocalAvail[targetKey] = !!sourceAvail;
      }
    }
    setLocalAvail(newLocalAvail);
  };

  const getDisplayPair = (dayKey, slotIndex) => {
    if (!weekSchedule?.[dayKey]?.[slotIndex]) return null;
    const pair = weekSchedule[dayKey][slotIndex][currentParity];
    if (pair) return pair;
    return weekSchedule[dayKey][slotIndex][currentParity === "even" ? "odd" : "even"] ?? null;
  };

  const isCurrentDay = (dk) => {
    const dayMap = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
    return dayMap[new Date().getDay()] === dk;
  };

  if (!selectedTeacherId) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '80px 16px' }}>
        <p style={{ color: 'var(--gray-500)' }}>Выберите преподавателя</p>
      </div>
    );
  }

  return (
    <div className="fade-in">
      {/* Teacher selector + parity */}
      <div className="admin-header">
        <select className="teacher-select" value={selectedTeacherId} onChange={e => setSelectedTeacherId(e.target.value)}>
          {TEACHERS.map(t => <option key={t.id} value={t.id}>{t.full}</option>)}
        </select>
        <div className="parity-selector">
          <span className="parity-label">Неделя:</span>
          <button className={`parity-btn ${currentParity === 'even' ? 'active' : ''}`}>Чётная</button>
          <button className={`parity-btn ${currentParity === 'odd' ? 'active' : ''}`}>Нечётная</button>
        </div>
      </div>

      {/* Tabs */}
      <div className="tab-bar">
        <button className={`tab-btn ${activeTab === 'schedule' ? 'active' : ''}`} onClick={() => setActiveTab('schedule')}>Моё расписание</button>
        <button className={`tab-btn ${activeTab === 'availability' ? 'active' : ''}`} onClick={() => setActiveTab('availability')}>Доступность</button>
      </div>

      {activeTab === 'schedule' && (
        <div>
          {/* Desktop grid */}
          <div className="desktop-schedule">
            <div className="card">
              <div className="schedule-wrapper">
                <div className="schedule-grid">
                  <div className="grid-header">
                    <div className="grid-header-cell">Время</div>
                    {DAYS.map(d => (
                      <div key={d.key} className={`grid-header-cell ${isCurrentDay(d.key) ? 'today' : ''}`}>{d.full}</div>
                    ))}
                  </div>
                  {TIME_SLOTS.slice(0, 6).map(slot => (
                    <div key={slot.index} className="grid-row">
                      <div className="time-cell">
                        <span className="time">{slot.start}–{slot.end}</span>
                        <span className="label">{slot.label}</span>
                      </div>
                      {DAYS.map(d => {
                        const pair = getDisplayPair(d.key, slot.index);
                        return (
                          <div key={d.key} className={`day-cell ${isCurrentDay(d.key) ? 'today-col' : ''}`}>
                            {pair ? <PairCardCompact pair={pair} currentParity={currentParity} showGroup={true} /> : <div className="empty-cell"><div className="empty-dots">{[0,1,2].map(i => <div key={i} className="empty-dot"></div>)}</div></div>}
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* Mobile list */}
          <div className="mobile-schedule">
            {DAYS.map(day => {
              const dayPairs = TIME_SLOTS.slice(0, 6).map(slot => ({ slot, pair: getDisplayPair(day.key, slot.index) })).filter(item => item.pair !== null);
              if (dayPairs.length === 0) return null;
              return (
                <div key={day.key} className="card" style={{ marginBottom: 16 }}>
                  <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--gray-200)', display: 'flex', alignItems: 'center', gap: 8 }}>
                    <i className="fas fa-clock" style={{ color: 'var(--primary)', fontSize: 14 }}></i>
                    <span style={{ fontSize: 13, fontWeight: 600 }}>{day.full}</span>
                  </div>
                  <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {dayPairs.map(({ slot, pair }) => (
                      <div key={slot.index}>
                        <span style={{ fontSize: 10, color: 'var(--gray-400)' }}>{slot.start}–{slot.end}</span>
                        <PairCardFull pair={pair} currentParity={currentParity} showGroup={true} />
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {activeTab === 'availability' && (
        <div className="card">
          <div style={{ padding: 20 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12, marginBottom: 16 }}>
              <h3 style={{ fontSize: 15, fontWeight: 700 }}>Доступность преподавателя</h3>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 13, color: 'var(--gray-500)' }}>Неделя:</span>
                <button className={`parity-btn btn-sm ${availParity === 'even' ? 'active' : ''}`} onClick={() => setAvailParity('even')}>Чётная</button>
                <button className={`parity-btn btn-sm ${availParity === 'odd' ? 'active' : ''}`} onClick={() => setAvailParity('odd')}>Нечётная</button>
              </div>
            </div>
            <p style={{ fontSize: 13, color: 'var(--gray-500)', marginBottom: 16 }}>
              Нажмите на ячейку, чтобы указать доступность.{' '}
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}><span style={{ display: 'inline-block', width: 12, height: 12, borderRadius: 3, background: '#d1fae5', border: '1px solid #6ee7b7' }}></span> — доступен</span>{' '}
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}><span style={{ display: 'inline-block', width: 12, height: 12, borderRadius: 3, background: '#f3f4f6', border: '1px solid #d1d5db' }}></span> — недоступен</span>
            </p>
            <div className="schedule-wrapper">
              <div className="avail-grid" style={{ minWidth: 600 }}>
                <div className="grid-header">
                  <div className="grid-header-cell" style={{ padding: 8 }}>Время</div>
                  {DAYS.map(d => <div key={d.key} className="grid-header-cell" style={{ padding: 8 }}>{d.short}</div>)}
                </div>
                {TIME_SLOTS.slice(0, 6).map(slot => (
                  <div key={slot.index} className="grid-row">
                    <div className="time-cell" style={{ padding: 8 }}>
                      <span className="time">{slot.start}–{slot.end}</span>
                    </div>
                    {DAYS.map(d => {
                      const key = `${d.key}:${slot.index}:${availParity}`;
                      const isAvailable = localAvail[key] ?? false;
                      return (
                        <div key={d.key} className="day-cell" style={{ padding: 4 }}>
                          <button className={`avail-btn ${isAvailable ? 'available' : 'unavailable'}`} onClick={() => toggleAvailCell(d.key, slot.index)} title={isAvailable ? 'Доступен' : 'Недоступен'}>
                            <i className={`fas ${isAvailable ? 'fa-check' : 'fa-times'}`}></i>
                          </button>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            </div>
            <div style={{ marginTop: 20, display: 'flex', gap: 12, flexWrap: 'wrap', borderTop: '1px solid var(--gray-200)', paddingTop: 20 }}>
              <button className="btn btn-primary" onClick={submitAvailability}>
                <i className="fas fa-paper-plane"></i>
                {saved ? 'Сохранено ✓' : 'Отправить учебной части'}
              </button>
              <button className="btn" onClick={copyFromOtherParity}>
                <i className="fas fa-copy"></i>
                Скопировать с {availParity === 'even' ? 'нечётной' : 'чётной'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Admin View ──
function AdminView({ cells, setCells, currentParity, availabilities }) {
  const [adminGroupCode, setAdminGroupCode] = useState('ОЭ-11');
  const [adminDayKey, setAdminDayKey] = useState('mon');
  const [adminParity, setAdminParity] = useState('even');
  const [activeTab, setActiveTab] = useState('constructor');
  const [isGenerating, setIsGenerating] = useState(false);
  const [genProgress, setGenProgress] = useState([]);
  const [genResult, setGenResult] = useState(null);
  const [isPublished, setIsPublished] = useState(false);
  const [showAddModal, setShowAddModal] = useState(false);
  const [addForm, setAddForm] = useState({ subjectId: '', teacherId: '', roomId: '' });

  const conflicts = useMemo(() => getConflicts(cells, availabilities), [cells, availabilities]);

  const weekSchedule = useMemo(() => {
    return buildGroupSchedule(cells, adminGroupCode);
  }, [cells, adminGroupCode]);

  const stats = useMemo(() => {
    const totalCells = cells.length;
    const uniqueSubjects = new Set(cells.map(c => c.subjectId)).size;
    const uniqueTeachers = new Set(cells.map(c => c.teacherId)).size;
    const uniqueRooms = new Set(cells.map(c => c.roomId)).size;
    return { totalCells, uniqueSubjects, uniqueTeachers, uniqueRooms };
  }, [cells]);

  const autoGenerate = () => {
    setIsGenerating(true);
    setGenProgress([]);
    setGenResult(null);
    const progress = [];
    const addStep = (msg) => { progress.push(msg); setGenProgress([...progress]); };

    setTimeout(() => {
      addStep("Инициализация генератора расписания...");
      setTimeout(() => {
        addStep("Обработка ограничений...");
        setTimeout(() => {
          addStep("Закреплено 0 занятий");
          setTimeout(() => {
            const newCells = generateSchedule(`autogen-${Date.now()}`);
            addStep(`Сгенерировано ${newCells.length} ячеек расписания`);
            setCells(newCells);
            setTimeout(() => {
              addStep(`Итого: ${newCells.length} занятий в расписании`);
              addStep("Проверка конфликтов...");
              setTimeout(() => {
                const newConflicts = getConflicts(newCells, availabilities);
                addStep(newConflicts.length === 0 ? "Конфликтов не обнаружено ✓" : `Обнаружено ${newConflicts.length} конфликтов`);
                setGenResult({ success: newConflicts.filter(c => c.severity === 'error').length === 0, conflicts: newConflicts });
                setIsGenerating(false);
              }, 400);
            }, 300);
          }, 400);
        }, 400);
      }, 400);
    }, 300);
  };

  const handleAddCell = () => {
    if (!addForm.subjectId || !addForm.teacherId || !addForm.roomId) return;
    const newCell = {
      id: `manual-${Date.now()}`,
      groupCode: adminGroupCode,
      dayKey: adminDayKey,
      slotIndex: 0,
      parity: adminParity,
      subjectId: addForm.subjectId,
      teacherId: addForm.teacherId,
      roomId: addForm.roomId,
      combined: false,
    };
    setCells([...cells, newCell]);
    setShowAddModal(false);
    setAddForm({ subjectId: '', teacherId: '', roomId: '' });
  };

  const getDisplayPair = (dayKey, slotIndex) => {
    if (!weekSchedule?.[dayKey]?.[slotIndex]) return null;
    const pair = weekSchedule[dayKey][slotIndex][adminParity];
    if (pair) return pair;
    return weekSchedule[dayKey][slotIndex][adminParity === "even" ? "odd" : "even"] ?? null;
  };

  return (
    <div className="fade-in">
      {/* Stats */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: 16, marginBottom: 24 }}>
        <div className="stat-card">
          <div className="stat-value">{stats.totalCells}</div>
          <div className="stat-label">Занятий в расписании</div>
        </div>
        <div className="stat-card">
          <div className="stat-value">{stats.uniqueSubjects}</div>
          <div className="stat-label">Дисциплин</div>
        </div>
        <div className="stat-card">
          <div className="stat-value">{stats.uniqueTeachers}</div>
          <div className="stat-label">Преподавателей</div>
        </div>
        <div className="stat-card">
          <div className="stat-value">{conflicts.length}</div>
          <div className="stat-label" style={{ color: conflicts.length > 0 ? 'var(--error)' : undefined }}>Конфликтов</div>
        </div>
      </div>

      {/* Tabs */}
      <div className="tab-bar">
        <button className={`tab-btn ${activeTab === 'constructor' ? 'active' : ''}`} onClick={() => setActiveTab('constructor')}>Конструктор</button>
        <button className={`tab-btn ${activeTab === 'autogen' ? 'active' : ''}`} onClick={() => setActiveTab('autogen')}>Автогенерация</button>
        <button className={`tab-btn ${activeTab === 'conflicts' ? 'active' : ''}`} onClick={() => setActiveTab('conflicts')}>Конфликты</button>
      </div>

// SUBJECT MANAGEMENT COMPONENT (Admin)
// ═══════════════════════════════════════════════
function SubjectManagement({ cells }) {
  const [selectedSubject, setSelectedSubject] = useState(null);

  // Calculate hours per subject per group
  const subjectStats = useMemo(() => {
    const stats = {};
    for (const subject of SUBJECTS) {
      const subjectCells = cells.filter(c => c.subjectId === subject.id);
      const byGroup = {};
      for (const cell of subjectCells) {
        if (!byGroup[cell.groupCode]) byGroup[cell.groupCode] = 0;
        byGroup[cell.groupCode]++;
      }
      const teachers = [...new Set(subjectCells.map(c => c.teacherId))];
      stats[subject.id] = {
        totalHours: subjectCells.length,
        groups: Object.entries(byGroup).map(([code, hours]) => ({ code, hours })),
        teachers: teachers.map(tid => teacherMap.get(tid)).filter(Boolean),
      };
    }
    return stats;
  }, [cells]);

  return (
    <div>
      <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 16 }}>Управление дисциплинами</h3>

      {/* Subject list */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {SUBJECTS.map(s => {
          const stat = subjectStats[s.id];
          const isExpanded = selectedSubject === s.id;
          return (
            <div key={s.id} className="card" style={{ overflow: 'hidden' }}>
              <div
                style={{ padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer', transition: 'var(--transition)' }}
                onClick={() => setSelectedSubject(isExpanded ? null : s.id)}
              >
                <span style={{ width: 10, height: 10, borderRadius: '50%', background: s.color, flexShrink: 0 }}></span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>{s.name}</div>
                  <div style={{ fontSize: 12, color: 'var(--gray-500)' }}>
                    {stat.totalHours} ч/нед • {stat.groups.length} групп • {stat.teachers.length} преподав.
                  </div>
                </div>
                <span style={{ padding: '2px 8px', borderRadius: 6, fontSize: 11, fontWeight: 600, background: s.type === 'lek' ? '#f3e8ff' : '#dbeafe', color: s.type === 'lek' ? '#7c3aed' : '#2563eb' }}>
                  {s.type === 'lek' ? 'Лекция' : 'Практика'}
                </span>
                <i className={`fas fa-chevron-${isExpanded ? 'up' : 'down'}`} style={{ color: 'var(--gray-400)', fontSize: 12 }}></i>
              </div>

              {isExpanded && (
                <div style={{ padding: '0 16px 16px', borderTop: '1px solid var(--gray-100)' }}>
                  <div style={{ marginTop: 12, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                    <div>
                      <h5 style={{ fontSize: 12, fontWeight: 600, color: 'var(--gray-500)', marginBottom: 8 }}>Группы и часы</h5>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                        {stat.groups.map(g => (
                          <div key={g.code} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '4px 8px', borderRadius: 6, background: 'var(--gray-50)' }}>
                            <span style={{ fontSize: 12, fontWeight: 600 }}>{g.code}</span>
                            <span style={{ fontSize: 12, color: 'var(--gray-500)' }}>{g.hours} ч</span>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div>
                      <h5 style={{ fontSize: 12, fontWeight: 600, color: 'var(--gray-500)', marginBottom: 8 }}>Преподаватели</h5>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                        {stat.teachers.map(t => (

// ═══════════════════════════════════════════════
// QUICK STATS BAR
// ═══════════════════════════════════════════════
function QuickStatsBar({ cells }) {
  const stats = useMemo(() => {
    const totalPairs = cells.length;
    const lecturePairs = cells.filter(c => subjectMap.get(c.subjectId)?.type === 'lek').length;
    const practicePairs = totalPairs - lecturePairs;
    const combinedPairs = cells.filter(c => c.combined).length;
    const paritySplit = cells.filter(c => {
      const sameSlotOther = cells.find(c2 => c2.groupCode === c.groupCode && c2.dayKey === c.dayKey && c2.slotIndex === c.slotIndex && c2.parity !== c.parity && c2.subjectId === c.subjectId);
      return !sameSlotOther;
    }).length;
    const uniqueSubjects = new Set(cells.map(c => c.subjectId)).size;
    const busyRooms = new Set(cells.map(c => c.roomId)).size;
    return { totalPairs, lecturePairs, practicePairs, combinedPairs, uniqueSubjects, busyRooms };
  }, [cells]);

  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: 12, marginBottom: 24, padding: 16, borderRadius: 16, background: 'var(--gray-50)', border: '1px solid var(--gray-200)' }}>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 20, fontWeight: 800, background: 'var(--gradient-primary)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>{stats.totalPairs}</div>
        <div style={{ fontSize: 10, color: 'var(--gray-500)', fontWeight: 600 }}>Всего занятий</div>
      </div>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 20, fontWeight: 800, color: '#7c3aed' }}>{stats.lecturePairs}</div>
        <div style={{ fontSize: 10, color: 'var(--gray-500)', fontWeight: 600 }}>Лекций</div>
      </div>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 20, fontWeight: 800, color: '#2563eb' }}>{stats.practicePairs}</div>
        <div style={{ fontSize: 10, color: 'var(--gray-500)', fontWeight: 600 }}>Практик</div>
      </div>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 20, fontWeight: 800, color: '#b45309' }}>{stats.combinedPairs}</div>
        <div style={{ fontSize: 10, color: 'var(--gray-500)', fontWeight: 600 }}>Совмещённых</div>
      </div>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 20, fontWeight: 800, color: 'var(--primary)' }}>{stats.uniqueSubjects}</div>
        <div style={{ fontSize: 10, color: 'var(--gray-500)', fontWeight: 600 }}>Дисциплин</div>
      </div>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 20, fontWeight: 800, color: 'var(--accent)' }}>{stats.busyRooms}</div>
        <div style={{ fontSize: 10, color: 'var(--gray-500)', fontWeight: 600 }}>Аудиторий</div>
      </div>
    </div>
  );
}
