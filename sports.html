<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Планово — Демо: Спортивные секции</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#f59e0b;--primary-light:#fbbf24;--secondary:#ef4444;--secondary-light:#f87171;
  --accent:#f97316;--gradient-primary:linear-gradient(135deg,#f59e0b 0%,#ef4444 100%);
  --dark:#0f172a;--gray-600:#4b5563;--gray-500:#6b7280;--gray-400:#9ca3af;
  --gray-300:#d1d5db;--gray-200:#e5e7eb;--gray-100:#f3f4f6;--gray-50:#f9fafb;
  --white:#ffffff;--success:#10b981;--warning:#f59e0b;--error:#ef4444;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);--shadow-md:0 4px 6px rgba(0,0,0,0.1);
  --shadow-lg:0 10px 15px rgba(0,0,0,0.1);--shadow-xl:0 20px 25px rgba(0,0,0,0.1);
  --transition:all 0.2s ease;
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--dark);background:var(--gray-50);line-height:1.5}
.container{max-width:1200px;margin:0 auto;padding:0 16px}
@media(min-width:640px){.container{padding:0 24px}}

.app-header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--gray-200)}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-icon{width:40px;height:40px;border-radius:12px;background:var(--gradient-primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;box-shadow:var(--shadow-md)}
.logo-text{font-weight:800;font-size:18px;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:10px;color:var(--gray-500);display:none}
@media(min-width:640px){.logo-sub{display:block}}
.role-tabs{display:flex;gap:8px}
.role-tab{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:1px solid var(--gray-200);background:#fff;font-size:13px;font-weight:600;color:var(--gray-600);cursor:pointer;transition:var(--transition);white-space:nowrap}
.role-tab:hover{border-color:var(--primary-light);color:var(--primary)}
.role-tab.active{background:var(--gradient-primary);color:#fff;border-color:transparent;box-shadow:var(--shadow-md)}
.role-tab i{font-size:14px}
.mobile-menu-btn{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border:none;background:none;color:var(--gray-600);font-size:20px;cursor:pointer;border-radius:8px}
.mobile-menu-btn:hover{background:var(--gray-100)}
@media(min-width:768px){.mobile-menu-btn{display:none}.role-tabs-desktop{display:flex}.role-tabs-mobile{display:none!important}}
@media(max-width:767px){.role-tabs-desktop{display:none}.role-tabs-mobile{display:flex;flex-direction:column;padding-bottom:16px;gap:8px}}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--gray-500);font-size:13px;font-weight:500;text-decoration:none;padding:8px 0;transition:var(--transition)}
.back-link:hover{color:var(--primary)}
.main-content{padding:24px 0 48px}
.card{background:#fff;border:1px solid var(--gray-200);border-radius:16px;overflow:hidden}
.card-body{padding:24px}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;border:1px solid var(--gray-200);background:#fff;font-size:13px;font-weight:600;font-family:inherit;color:var(--gray-600);cursor:pointer;transition:var(--transition)}
.btn:hover{border-color:var(--primary-light);color:var(--primary)}
.btn-primary{background:var(--gradient-primary);color:#fff;border-color:transparent;box-shadow:var(--shadow-md)}
.btn-primary:hover{box-shadow:var(--shadow-lg);opacity:0.95;color:#fff}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border-color:transparent}
.btn-success:hover{opacity:0.95;color:#fff}

.tab-bar{display:flex;gap:4px;background:var(--gray-100);border-radius:12px;padding:4px;margin-bottom:16px}
.tab-btn{flex:1;padding:8px 16px;border:none;background:none;border-radius:10px;font-size:13px;font-weight:600;color:var(--gray-500);cursor:pointer;transition:var(--transition);font-family:inherit}
.tab-btn:hover{color:var(--gray-600)}
.tab-btn.active{background:#fff;color:var(--dark);box-shadow:var(--shadow-sm)}

.section-title{font-size:16px;font-weight:700;margin-bottom:12px}

/* Schedule grid */
.schedule-wrapper{overflow-x:auto}
.schedule-grid{min-width:900px}
.grid-header{display:grid;grid-template-columns:80px repeat(7,1fr);border-bottom:1px solid var(--gray-200)}
.grid-header-cell{padding:10px;text-align:center;font-size:11px;font-weight:600;color:var(--gray-500);border-right:1px solid var(--gray-200)}
.grid-header-cell:last-child{border-right:none}
.grid-header-cell.today{color:var(--primary);background:rgba(245,158,11,0.05)}
.grid-row{display:grid;grid-template-columns:80px repeat(7,1fr);border-bottom:1px solid var(--gray-200)}
.grid-row:last-child{border-bottom:none}
.time-cell{padding:8px;border-right:1px solid var(--gray-200);display:flex;flex-direction:column;justify-content:center}
.time-cell .time{font-size:11px;color:var(--gray-400)}
.day-cell{padding:6px;border-right:1px solid var(--gray-200);min-height:60px}
.day-cell:last-child{border-right:none}
.day-cell.today-col{background:rgba(245,158,11,0.02)}

/* Training card */
.training-card{padding:8px;border-radius:10px;border:1px solid var(--gray-200);background:#fff;transition:var(--transition);cursor:pointer;font-size:11px}
.training-card:hover{border-color:var(--primary-light);box-shadow:var(--shadow-sm)}
.training-card .tc-name{font-weight:700;margin-bottom:2px}
.training-card .tc-info{color:var(--gray-500);font-size:10px}
.training-card .tc-count{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:1px 6px;border-radius:6px;background:rgba(245,158,11,0.1);color:var(--primary);font-weight:600}

/* Section card */
.section-card{padding:20px;border-radius:16px;border:1px solid var(--gray-200);background:#fff;transition:var(--transition);cursor:pointer}
.section-card:hover{border-color:var(--primary-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.section-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;margin-bottom:12px}
.section-card h3{font-size:16px;font-weight:700;margin-bottom:4px}
.section-card p{font-size:13px;color:var(--gray-500);margin-bottom:12px}
.section-badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}

/* Client schedule */
.client-slot{padding:12px;border-radius:12px;border:1px solid var(--gray-200);background:#fff;margin-bottom:8px;transition:var(--transition)}
.client-slot:hover{border-color:var(--primary-light)}
.client-slot .cs-time{font-size:11px;color:var(--gray-400);font-weight:500}
.client-slot .cs-name{font-weight:700;font-size:14px;margin-top:2px}
.client-slot .cs-trainer{font-size:12px;color:var(--gray-500)}

/* Attendance */
.attendance-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-100)}
.attendance-row:last-child{border-bottom:none}
.att-avatar{width:36px;height:36px;border-radius:50%;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--gray-500)}
.att-name{flex:1;font-size:13px;font-weight:500}
.att-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--gray-200);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);font-size:12px}
.att-btn.present{background:#d1fae5;border-color:#6ee7b7;color:#059669}
.att-btn.absent{background:#fef2f2;border-color:#fecaca;color:#dc2626}

/* Subscription card */
.sub-card{padding:16px;border-radius:12px;border:1px solid var(--gray-200);background:#fff}
.sub-card .sub-name{font-weight:700;font-size:14px}
.sub-card .sub-visits{font-size:12px;color:var(--gray-500);margin-top:4px}
.sub-progress{height:6px;border-radius:3px;background:var(--gray-100);margin-top:8px;overflow:hidden}
.sub-progress-bar{height:100%;border-radius:3px;background:var(--gradient-primary);transition:width 0.3s ease}

/* Stats */
.stat-card{padding:20px;border-radius:16px;border:1px solid var(--gray-200);background:#fff}
.stat-card .stat-value{font-size:28px;font-weight:800;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card .stat-label{font-size:12px;color:var(--gray-500);margin-top:4px}

/* Next training indicator */
.next-training{display:flex;align-items:center;gap:16px;padding:16px;border-radius:16px;border:1px solid rgba(245,158,11,0.3);background:rgba(245,158,11,0.05);margin-bottom:16px}
.next-training .nt-icon{width:48px;height:48px;border-radius:12px;background:var(--gradient-primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px}
.next-training .nt-label{font-size:11px;color:var(--gray-500);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.next-training .nt-name{font-size:15px;font-weight:700;margin-top:2px}
.next-training .nt-time{font-size:13px;color:var(--gray-500);margin-top:2px}

/* Mobile */
.mobile-schedule{display:none}
@media(max-width:1023px){.desktop-schedule{display:none}.mobile-schedule{display:block}}
@media(min-width:1024px){.desktop-schedule{display:block}.mobile-schedule{display:none}}
.mobile-day-tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px}
.mobile-day-tab{padding:8px 16px;border-radius:10px;border:1px solid var(--gray-200);background:#fff;font-size:13px;font-weight:600;color:var(--gray-500);cursor:pointer;transition:var(--transition);white-space:nowrap}
.mobile-day-tab:hover{border-color:var(--primary-light)}
.mobile-day-tab.active{background:var(--gradient-primary);color:#fff;border-color:transparent}

/* Fade in */
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeInUp 0.3s ease-out}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-400)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useCallback}=React;

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const DAYS=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const DAY_KEYS=["mon","tue","wed","thu","fri","sat","sun"];
const TIME_SLOTS=[
  {start:"08:00",end:"09:30",label:"Утро"},
  {start:"10:00",end:"11:30",label:"День 1"},
  {start:"12:00",end:"13:30",label:"День 2"},
  {start:"14:00",end:"15:30",label:"День 3"},
  {start:"16:00",end:"17:30",label:"Вечер 1"},
  {start:"18:00",end:"19:30",label:"Вечер 2"},
  {start:"20:00",end:"21:30",label:"Поздний"},
];

const SECTIONS=[
  {id:"s1",name:"Борьба",icon:"fa-hand-fist",color:"#ef4444",gradient:"linear-gradient(135deg,#ef4444,#dc2626)",trainer:"Иванов А.С.",maxStudents:15,age:"8+",description:"Классическая и вольная борьба для детей и взрослых"},
  {id:"s2",name:"Плавание",icon:"fa-person-swimming",color:"#0ea5e9",gradient:"linear-gradient(135deg,#0ea5e9,#0284c7)",trainer:"Петрова М.В.",maxStudents:12,age:"6+",description:"Обучение плаванию, спортивное плавание, аквааэробика"},
  {id:"s3",name:"Танцы",icon:"fa-music",color:"#ec4899",gradient:"linear-gradient(135deg,#ec4899,#db2777)",trainer:"Сидорова Е.Н.",maxStudents:20,age:"5+",description:"Хип-хоп, контемпорари, бальные танцы"},
  {id:"s4",name:"Гимнастика",icon:"fa-person",color:"#8b5cf6",gradient:"linear-gradient(135deg,#8b5cf6,#7c3aed)",trainer:"Козлов Д.В.",maxStudents:10,age:"4+",description:"Художественная и спортивная гимнастика"},
  {id:"s5",name:"Фитнес",icon:"fa-dumbbell",color:"#f59e0b",gradient:"linear-gradient(135deg,#f59e0b,#d97706)",trainer:"Морозова Т.К.",maxStudents:25,age:"16+",description:"Кроссфит, функциональная тренировка, йога"},
];

const CLIENTS=[
  {id:"c1",name:"Алексей Смирнов",age:14,sectionId:"s1",subscription:{total:12,used:7}},
  {id:"c2",name:"Мария Иванова",age:10,sectionId:"s1",subscription:{total:12,used:11}},
  {id:"c3",name:"Дмитрий Козлов",age:16,sectionId:"s1",subscription:{total:8,used:3}},
  {id:"c4",name:"Анна Петрова",age:8,sectionId:"s2",subscription:{total:12,used:5}},
  {id:"c5",name:"Иван Сидоров",age:12,sectionId:"s2",subscription:{total:12,used:9}},
  {id:"c6",name:"Елена Волкова",age:25,sectionId:"s2",subscription:{total:8,used:2}},
  {id:"c7",name:"Ольга Новикова",age:9,sectionId:"s3",subscription:{total:12,used:8}},
  {id:"c8",name:"Никита Морозов",age:11,sectionId:"s3",subscription:{total:12,used:6}},
  {id:"c9",name:"Софья Лебедева",age:7,sectionId:"s3",subscription:{total:8,used:1}},
  {id:"c10",name:"Артём Зайцев",age:6,sectionId:"s4",subscription:{total:12,used:10}},
  {id:"c11",name:"Полина Павлова",age:5,sectionId:"s4",subscription:{total:12,used:4}},
  {id:"c12",name:"Виктория Соколова",age:8,sectionId:"s4",subscription:{total:8,used:7}},
  {id:"c13",name:"Андрей Буфеев",age:30,sectionId:"s5",subscription:{total:8,used:5}},
  {id:"c14",name:"Наталья Карпова",age:28,sectionId:"s5",subscription:{total:8,used:3}},
  {id:"c15",name:"Сергей Малый",age:35,sectionId:"s5",subscription:{total:12,used:9}},
  {id:"c16",name:"Кристина Волкова",age:22,sectionId:"s5",subscription:{total:12,used:2}},
  {id:"c17",name:"Павел Громов",age:12,sectionId:"s1",subscription:{total:8,used:6}},
  {id:"c18",name:"Вера Лисицына",age:7,sectionId:"s3",subscription:{total:12,used:3}},
  {id:"c19",name:"Тимофей Орлов",age:9,sectionId:"s2",subscription:{total:12,used:7}},
  {id:"c20",name:"Алиса Белова",age:11,sectionId:"s4",subscription:{total:8,used:4}},
];

// Training schedule: dayIndex -> slotIndex -> [{sectionId, groupId}]
const SCHEDULE_DATA={
  "0":[{0:[{sectionId:"s1",group:"Младшая"}],5:[{sectionId:"s1",group:"Старшая"}],1:[{sectionId:"s2",group:"Дети"}],6:[{sectionId:"s5",group:"Взрослые"}],2:[{sectionId:"s3",group:"Младшая"}],4:[{sectionId:"s4",group:"Основная"}]}],
  "1":[{1:[{sectionId:"s2",group:"Взрослые"}],3:[{sectionId:"s4",group:"Младшая"}],5:[{sectionId:"s3",group:"Старшая"}],6:[{sectionId:"s5",group:"Утренний"}]}],
  "2":[{0:[{sectionId:"s1",group:"Младшая"}],5:[{sectionId:"s1",group:"Старшая"}],2:[{sectionId:"s2",group:"Дети"}],4:[{sectionId:"s3",group:"Младшая"}],6:[{sectionId:"s5",group:"Взрослые"}]}],
  "3":[{1:[{sectionId:"s2",group:"Дети"}],3:[{sectionId:"s4",group:"Основная"}],5:[{sectionId:"s3",group:"Старшая"}],6:[{sectionId:"s5",group:"Утренний"}]}],
  "4":[{0:[{sectionId:"s1",group:"Общая"}],2:[{sectionId:"s2",group:"Взрослые"}],4:[{sectionId:"s4",group:"Младшая"}],5:[{sectionId:"s3",group:"Общая"}]}],
  "5":[{0:[{sectionId:"s4",group:"Основная"}],1:[{sectionId:"s2",group:"Дети"}],3:[{sectionId:"s1",group:"Младшая"}],5:[{sectionId:"s5",group:"Взрослые"}]}],
};

// Build flat schedule from SCHEDULE_DATA
function buildSchedule(){
  const result=[];
  for(const[dayIdx,slots] of Object.entries(SCHEDULE_DATA)){
    for(const slotObj of slots){
      for(const[slotIdx,trainings] of Object.entries(slotObj)){
        for(const t of trainings){
          result.push({dayIndex:parseInt(dayIdx),slotIndex:parseInt(slotIdx),...t});
        }
      }
    }
  }
  return result;
}
const ALL_TRAININGS=buildSchedule();

// ═══════════════════════════════════════════
// Now info
// ═══════════════════════════════════════════
function getNowInfo(){
  const now=new Date();
  const dow=now.getDay(); // 0=Sun
  const dayMap=[6,0,1,2,3,4,5]; // Mon=0
  const currentDay=dayMap[dow];
  const mins=now.getHours()*60+now.getMinutes();
  let currentSlot=null;
  for(let i=0;i<TIME_SLOTS.length;i++){
    if(mins>=parseInt(TIME_SLOTS[i].start.split(':')[0])*60+parseInt(TIME_SLOTS[i].start.split(':')[1]) && mins<=parseInt(TIME_SLOTS[i].end.split(':')[0])*60+parseInt(TIME_SLOTS[i].end.split(':')[1])){
      currentSlot=i;break;
    }
  }
  return{currentDay,currentSlot,isWeekend:dow===0};
}

// ═══════════════════════════════════════════
// COACH VIEW
// ═══════════════════════════════════════════
function CoachView(){
  const[selectedSection,setSelectedSection]=useState("s1");
  const[mobileDay,setMobileDay]=useState(0);
  const[attendance,setAttendance]=useState({});
  const[activeTab,setActiveTab]=useState('schedule');
  const nowInfo=getNowInfo();
  const section=SECTIONS.find(s=>s.id===selectedSection);
  const sectionClients=CLIENTS.filter(c=>c.sectionId===selectedSection);
  const sectionTrainings=ALL_TRAININGS.filter(t=>t.sectionId===selectedSection);

  // Find next training
  const nextTraining=useMemo(()=>{
    const now=new Date();const dow=now.getDay();const dayMap=[6,0,1,2,3,4,5];
    const today=dayMap[dow];
    const mins=now.getHours()*60+now.getMinutes();
    // Find today's upcoming
    let todayTrainings=sectionTrainings.filter(t=>t.dayIndex===today).sort((a,b)=>a.slotIndex-b.slotIndex);
    for(const t of todayTrainings){
      const slot=TIME_SLOTS[t.slotIndex];
      if(slot){
        const startMins=parseInt(slot.start.split(':')[0])*60+parseInt(slot.start.split(':')[1]);
        if(startMins>mins) return{...t,when:"Сегодня",time:slot.start};
      }
    }
    // Find next day
    for(let d=1;d<7;d++){
      const nextDay=(today+d)%7;
      const dayTrainings=sectionTrainings.filter(t=>t.dayIndex===nextDay).sort((a,b)=>a.slotIndex-b.slotIndex);
      if(dayTrainings.length>0){
        const t=dayTrainings[0];
        const slot=TIME_SLOTS[t.slotIndex];
        return{...t,when:DAYS[nextDay],time:slot?.start||""};
      }
    }
    return null;
  },[sectionTrainings]);

  const toggleAttendance=(clientId,sessionId)=>{
    const key=`${clientId}-${sessionId}`;
    setAttendance(prev=>({...prev,[key]:prev[key]==='present'?'absent':prev[key]==='absent'?null:'present'}));
  };

  const getAttendance=(clientId,sessionId)=>{
    return attendance[`${clientId}-${sessionId}`]||null;
  };

  return(
    <div className="fade-in">
      {/* Section selector */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
        {SECTIONS.map(s=>(
          <button key={s.id} className={`role-tab ${selectedSection===s.id?'active':''}`} onClick={()=>setSelectedSection(s.id)} style={selectedSection===s.id?{background:s.gradient}:{}}>
            <i className={`fas ${s.icon}`}></i> {s.name}
          </button>
        ))}
      </div>

      {/* Next training */}
      {nextTraining && (
        <div className="next-training">
          <div className="nt-icon" style={{background:section?.gradient}}><i className={`fas ${section?.icon}`}></i></div>
          <div>
            <div className="nt-label">Следующая тренировка</div>
            <div className="nt-name">{section?.name} — {nextTraining.group}</div>
            <div className="nt-time">{nextTraining.when}, {nextTraining.time}</div>
          </div>
        </div>
      )}

      {/* Tabs */}
      <div className="tab-bar">
        <button className={`tab-btn ${activeTab==='schedule'?'active':''}`} onClick={()=>setActiveTab('schedule')}>Расписание</button>
        <button className={`tab-btn ${activeTab==='attendance'?'active':''}`} onClick={()=>setActiveTab('attendance')}>Посещаемость</button>
        <button className={`tab-btn ${activeTab==='groups'?'active':''}`} onClick={()=>setActiveTab('groups')}>Группы</button>
      </div>

      {activeTab==='schedule' && (

}

// ADMIN VIEW
// ═══════════════════════════════════════════
function AdminView(){
  const[activeTab,setActiveTab]=useState('dashboard');

  const stats=useMemo(()=>({
    totalClients:CLIENTS.length,
    totalSections:SECTIONS.length,
    totalTrainings:ALL_TRAININGS.length,
    activeSubs:CLIENTS.filter(c=>c.subscription.total-c.subscription.used>0).length,
    expiringSubs:CLIENTS.filter(c=>{const r=c.subscription.total-c.subscription.used;return r>0&&r<=2;}).length,
    expiredSubs:CLIENTS.filter(c=>c.subscription.total-c.subscription.used<=0).length,
  }),[]);

  const sectionStats=useMemo(()=>{
    return SECTIONS.map(s=>{
      const clients=CLIENTS.filter(c=>c.sectionId===s.id);
      const trainings=ALL_TRAININGS.filter(t=>t.sectionId===s.id);
      const totalVisits=clients.reduce((sum,c)=>sum+c.subscription.used,0);
      const totalPossible=clients.reduce((sum,c)=>sum+c.subscription.total,0);
      return{...s,clients:clients.length,trainings:trainings.length,avgAttendance:totalPossible>0?Math.round(totalVisits/totalPossible*100):0};
    });
  },[]);

  return(
    <div className="fade-in">
      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:16,marginBottom:24}}>
        <div className="stat-card"><div className="stat-value">{stats.totalClients}</div><div className="stat-label">Клиентов</div></div>
        <div className="stat-card"><div className="stat-value">{stats.totalSections}</div><div className="stat-label">Секций</div></div>
        <div className="stat-card"><div className="stat-value">{stats.totalTrainings}</div><div className="stat-label">Тренировок/нед</div></div>
        <div className="stat-card"><div className="stat-value" style={{background:'linear-gradient(135deg,#10b981,#059669)',WebkitBackgroundClip:'text',backgroundClip:'text'}}>{stats.activeSubs}</div><div className="stat-label">Активных абонементов</div></div>
        <div className="stat-card"><div className="stat-value" style={{background:'linear-gradient(135deg,#f59e0b,#d97706)',WebkitBackgroundClip:'text',backgroundClip:'text'}}>{stats.expiringSubs}</div><div className="stat-label">Заканчивающихся</div></div>
        <div className="stat-card"><div className="stat-value" style={{background:'linear-gradient(135deg,#ef4444,#dc2626)',WebkitBackgroundClip:'text',backgroundClip:'text'}}>{stats.expiredSubs}</div><div className="stat-label">Истёкших</div></div>
      </div>

      <div className="tab-bar">
        <button className={`tab-btn ${activeTab==='dashboard'?'active':''}`} onClick={()=>setActiveTab('dashboard')}>Обзор</button>
        <button className={`tab-btn ${activeTab==='sections'?'active':''}`} onClick={()=>setActiveTab('sections')}>Секции</button>
        <button className={`tab-btn ${activeTab==='subscriptions'?'active':''}`} onClick={()=>setActiveTab('subscriptions')}>Абонементы</button>
        <button className={`tab-btn ${activeTab==='reports'?'active':''}`} onClick={()=>setActiveTab('reports')}>Отчёты</button>
      </div>

      {activeTab==='dashboard' && (
        <div>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Обзор по секциям</h3>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
            {sectionStats.map(s=>(
              <div key={s.id} className="card" style={{overflow:'hidden'}}>
                <div style={{height:4,background:s.gradient}}></div>
                <div className="card-body">
                  <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
                    <div style={{width:40,height:40,borderRadius:10,background:s.gradient,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:16}}>
                      <i className={`fas ${s.icon}`}></i>
                    </div>
                    <div>
                      <div style={{fontWeight:700,fontSize:15}}>{s.name}</div>
                      <div style={{fontSize:12,color:'var(--gray-500)'}}>{s.trainer}</div>
                    </div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:12}}>
                    <div style={{padding:8,borderRadius:8,background:'var(--gray-50)'}}>
                      <div style={{fontWeight:700,fontSize:18,color:s.color}}>{s.clients}</div>
                      <div style={{color:'var(--gray-500)'}}>клиентов</div>
                    </div>
                    <div style={{padding:8,borderRadius:8,background:'var(--gray-50)'}}>
                      <div style={{fontWeight:700,fontSize:18,color:s.color}}>{s.trainings}</div>
                      <div style={{color:'var(--gray-500)'}}>тренировок</div>
                    </div>
                  </div>
                  <div style={{marginTop:8}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--gray-500)',marginBottom:4}}>
                      <span>Ср. посещаемость</span><span>{s.avgAttendance}%</span>
                    </div>
                    <div className="sub-progress"><div className="sub-progress-bar" style={{width:`${s.avgAttendance}%`,background:s.gradient}}></div></div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

                      <span className="section-badge" style={{background:'rgba(245,158,11,0.1)',color:'#d97706'}}>{s.trainer}</span>
                      <span className="section-badge" style={{background:'rgba(16,185,129,0.1)',color:'#059669'}}>Макс. {s.maxStudents} чел.</span>
                      <span className="section-badge" style={{background:'rgba(99,102,241,0.1)',color:'#4f46e5'}}>Возраст: {s.age}</span>
                    </div>
                  </div>
                  <button className="btn btn-sm"><i className="fas fa-edit"></i> Редактировать</button>
                </div>
                <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--gray-100)'}}>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>Расписание:</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {ALL_TRAININGS.filter(t=>t.sectionId===s.id).map((t,i)=>(

              return(
                <div key={client.id} className="sub-card" style={isExpiring?{borderColor:'#fde68a'}:isExpired?{borderColor:'#fecaca'}:{}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                    <div className="att-avatar" style={{background:sec?`${sec.color}20`:'var(--gray-100)',color:sec?.color||'var(--gray-500)',fontSize:11}}>{client.name.split(' ').map(n=>n[0]).join('')}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13}}>{client.name}</div>
                      <div style={{fontSize:11,color:'var(--gray-400)'}}>{sec?.name} • {client.age} лет</div>
                    </div>
                  </div>
                  <div className="sub-progress"><div className="sub-progress-bar" style={{width:`${pct}%`,background:isExpired?'#ef4444':isExpiring?'#f59e0b':sec?.gradient||'var(--gradient-primary)'}}></div></div>
                  <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:11,color:'var(--gray-400)'}}>
                    <span>Использовано: {client.subscription.used}/{client.subscription.total}</span>
                    <span style={{color:isExpired?'var(--error)':isExpiring?'var(--warning)':'var(--success)',fontWeight:600}}>
                      {isExpired?'Истёк':isExpiring?'Заканчивается':'Активен'}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {activeTab==='reports' && (
        <div className="card">
          <div className="card-body">
            <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Отчёт по посещаемости</h3>
            <div style={{overflowX:auto}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                <thead>
                  <tr style={{borderBottom:'2px solid var(--gray-200)'}}>
                    <th style={{padding:10,textAlign:'left',fontWeight:600,color:'var(--gray-500)'}}>Секция</th>
                    <th style={{padding:10,textAlign:'center',fontWeight:600,color:'var(--gray-500)'}}>Клиентов</th>
                    <th style={{padding:10,textAlign:'center',fontWeight:600,color:'var(--gray-500)'}}>Тренировок</th>
                    <th style={{padding:10,textAlign:'center',fontWeight:600,color:'var(--gray-500)'}}>Ср. посещ.</th>
                    <th style={{padding:10,textAlign:'center',fontWeight:600,color:'var(--gray-500)'}}>Выручка (проп.)</th>
                  </tr>
                </thead>
                <tbody>
                  {sectionStats.map(s=>(
                    <tr key={s.id} style={{borderBottom:'1px solid var(--gray-100)'}}>
                      <td style={{padding:10}}><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{width:8,height:8,borderRadius:'50%',background:s.color}}></span>{s.name}</div></td>
                      <td style={{padding:10,textAlign:'center'}}>{s.clients}</td>
                      <td style={{padding:10,textAlign:'center'}}>{s.trainings}</td>
                      <td style={{padding:10,textAlign:'center'}}><span style={{fontWeight:700,color:s.avgAttendance>70?'var(--success)':s.avgAttendance>40?'var(--warning)':'var(--error)'}}>{s.avgAttendance}%</span></td>
                      <td style={{padding:10,textAlign:'center',fontWeight:600}}>{s.clients*2500} ₽</td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr style={{borderTop:'2px solid var(--gray-200)',fontWeight:700}}>
                    <td style={{padding:10}}>Итого</td>
                    <td style={{padding:10,textAlign:'center'}}>{stats.totalClients}</td>
                    <td style={{padding:10,textAlign:'center'}}>{stats.totalTrainings}</td>
                    <td style={{padding:10,textAlign:'center'}}>{Math.round(sectionStats.reduce((s,x)=>s+x.avgAttendance,0)/sectionStats.length)}%</td>
                    <td style={{padding:10,textAlign:'center'}}>{stats.totalClients*2500} ₽</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════
function App(){
  const[role,setRole]=useState('coach');
  const[mobileMenuOpen,setMobileMenuOpen]=useState(false);

  const roles=[
    {key:'coach',label:'Тренер',icon:'fa-whistle'},
    {key:'client',label:'Клиент',icon:'fa-user'},
    {key:'admin',label:'Администрация',icon:'fa-shield-alt'},
  ];

  return(
    <div>
      <header className="app-header">
        <div className="container">
          <div className="header-inner">
            <a href="index.html" className="logo">
              <div className="logo-icon"><i className="fas fa-calendar-alt"></i></div>
              <div><div className="logo-text">Планово</div><div className="logo-sub">Демо: Спортивные секции</div></div>
            </a>
            <div className="role-tabs-desktop role-tabs">
              {roles.map(r=>(
                <button key={r.key} className={`role-tab ${role===r.key?'active':''}`} onClick={()=>setRole(r.key)}>
                  <i className={`fas ${r.icon}`}></i> {r.label}
                </button>
              ))}
            </div>
            <button className="mobile-menu-btn" onClick={()=>setMobileMenuOpen(!mobileMenuOpen)}>
              <i className={`fas ${mobileMenuOpen?'fa-times':'fa-bars'}`}></i>
            </button>
          </div>
          {mobileMenuOpen&&(
            <div className="role-tabs-mobile" style={{paddingBottom:16,display:'flex',flexDirection:'column',gap:8}}>
              {roles.map(r=>(
                <button key={r.key} className={`role-tab ${role===r.key?'active':''}`} onClick={()=>{setRole(r.key);setMobileMenuOpen(false);}} style={{justifyContent:'flex-start'}}>
                  <i className={`fas ${r.icon}`}></i> {r.label}
                </button>
              ))}
            </div>
          )}
        </div>
      </header>
      <main className="main-content">
        <div className="container">
          <a href="index.html" className="back-link"><i className="fas fa-arrow-left"></i> Вернуться на сайт</a>
          {role==='coach'&&<CoachView/>}
          {role==='client'&&<ClientView/>}
          {role==='admin'&&<AdminView/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
