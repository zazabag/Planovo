<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <style>
      .d { fill: none; stroke: #6366f1; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; opacity: .17; }
    </style>
  </defs>
  <g class="d">
    <!-- calendar -->
    <g transform="translate(28 36) rotate(-14)">
      <rect x="0" y="4" width="22" height="20" rx="3"/>
      <path d="M0 10h22M7 0v6M15 0v6"/>
      <path d="M6 15h4M12 15h4"/>
    </g>
    <!-- book -->
    <g transform="translate(168 52) rotate(11)">
      <path d="M0 4c4-2 8-2 12 0v18c-4-2-8-2-12 0V4z"/>
      <path d="M12 4c4-2 8-2 12 0v18c-4-2-8-2-12 0V4z"/>
    </g>
    <!-- clock -->
    <g transform="translate(312 24) rotate(8)">
      <circle cx="11" cy="11" r="10"/>
      <path d="M11 6v5l4 2"/>
    </g>
    <!-- graduation cap -->
    <g transform="translate(72 168) rotate(-6)">
      <path d="M0 8L16 0l16 8-16 8L0 8z"/>
      <path d="M32 8v8c0 4-7 8-16 8S0 20 0 16V8"/>
      <path d="M32 8l4 10"/>
    </g>
    <!-- users -->
    <g transform="translate(248 148) rotate(12)">
      <circle cx="8" cy="6" r="4"/>
      <path d="M0 18c0-4 3.5-7 8-7s8 3 8 7"/>
      <circle cx="20" cy="7" r="3"/>
      <path d="M16 18c0-3 2-5 5-5"/>
    </g>
    <!-- bell -->
    <g transform="translate(330 210) rotate(-10)">
      <path d="M8 2c-3 0-5 2.5-5 6v5l-2 3h14l-2-3V8c0-3.5-2-6-5-6z"/>
      <path d="M6 20c0 1.5 1 3 3 3h2c2 0 3-1.5 3-3"/>
    </g>
    <!-- pencil -->
    <g transform="translate(108 300) rotate(-18)">
      <path d="M2 18L14 6l6 6L8 24H2v-6z"/>
      <path d="M14 6l4-4 4 4-4 4"/>
    </g>
    <!-- grid / schedule -->
    <g transform="translate(268 292) rotate(6)">
