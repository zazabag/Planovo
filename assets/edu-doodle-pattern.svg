    <g transform="translate(188 248) rotate(-8)">
      <path d="M11 2L1 20h20L11 2z"/>
      <path d="M11 9v5M11 17h.01"/>
    </g>
    <!-- star sparkle -->
    <g transform="translate(356 118) rotate(15)">
      <path d="M8 0l2 6 6 2-6 2-2 6-2-6-6-2 6-2z"/>
    </g>
    <!-- coffee mug (break between classes) -->
    <g transform="translate(148 332) rotate(-5)">
      <path d="M4 6h12v10c0 3-2 5-6 5s-6-2-6-5V6z"/>
      <path d="M16 8h2c2 0 3 1 3 3s-1 3-3 3h-2"/>
